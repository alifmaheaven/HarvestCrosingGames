<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<!-- Mobile-first, portrait, no zoom, respect safe areas (notch/home indicator) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#cfe8ff" />
<title>Kebun & Restoran Cozy 🌱</title>
<style>
/* =====================================================================
   COZY FARM & RESTAURANT — STYLES
   ---------------------------------------------------------------------
   Sections:
     [S1] Reset & root vars
     [S2] Canvas & layout
     [S3] HUD (coins, inventory, menu button)
     [S4] Joystick visuals
     [S5] Float popups, toasts, speech bubbles
     [S6] Overlays (splash, portrait-lock, fallback, modals)
     [S7] Settings / Notebook / RecipeBook panels
     [S8] Onboarding tooltips, save indicator, confetti
   ===================================================================== */

/* [S1] Reset & root vars ------------------------------------------------ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
:root{
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --cream:#fff6da; --leaf:#6aa84f; --leaf-dark:#3f6f33;
  --wood:#b98a55; --wood-dark:#8a6034; --ink:#4a3b2a;
  --panel:#fff9ec; --panel-edge:#e7c98f;
  --accent:#ff8fab; --heart:#ff5d7a;
}
html,body{
  width:100%;height:100%;overflow:hidden;position:fixed;
  font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif;
  background:#cfe8ff;color:var(--ink);
  touch-action:none;            /* kill browser pan/zoom gestures */
  overscroll-behavior:none;     /* kill pull-to-refresh */
}

/* [S2] Canvas & layout -------------------------------------------------- */
#game-canvas{display:block;width:100%;height:100%;touch-action:none;}
#ui-root{position:fixed;inset:0;pointer-events:none;z-index:10;
  padding:var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);}
#ui-root > *{pointer-events:auto;}

/* [S3] HUD -------------------------------------------------------------- */
.hud-pill{
  position:fixed;display:flex;align-items:center;gap:6px;
  background:rgba(255,249,236,.92);border:2px solid var(--panel-edge);
  border-radius:18px;padding:7px 12px;font-weight:700;font-size:15px;
  box-shadow:0 3px 0 rgba(0,0,0,.12);color:var(--ink);
}
#coin-pill{top:calc(var(--safe-t) + 10px);left:calc(var(--safe-l) + 10px);}
#day-pill{top:calc(var(--safe-t) + 10px);left:50%;transform:translateX(-50%);
  font-size:13px;padding:6px 12px;flex-direction:column;line-height:1.15;text-align:center;}
#day-pill small{font-weight:600;opacity:.8;font-size:11px;}

#menu-btn{
  position:fixed;top:calc(var(--safe-t) + 8px);right:calc(var(--safe-r) + 10px);
  width:48px;height:48px;border-radius:50%;background:rgba(255,249,236,.92);
  border:2px solid var(--panel-edge);font-size:22px;
  box-shadow:0 3px 0 rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;
}
#menu-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.12);}

/* energy bar under coin pill */
#energy-wrap{position:fixed;top:calc(var(--safe-t) + 52px);left:calc(var(--safe-l) + 10px);
  width:128px;height:14px;background:rgba(255,249,236,.85);border:2px solid var(--panel-edge);
  border-radius:10px;overflow:hidden;}
#energy-fill{height:100%;width:100%;background:linear-gradient(90deg,#ffd35e,#ff9f43);
  transition:width .3s ease;}
#energy-wrap::after{content:'⚡';position:absolute;left:4px;top:-1px;font-size:11px;}

/* inventory bar */
#inv-bar{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(var(--safe-b) + 10px);display:flex;gap:8px;
  background:rgba(255,249,236,.92);border:2px solid var(--panel-edge);
  border-radius:18px;padding:8px;max-width:94vw;overflow-x:auto;scrollbar-width:none;}
#inv-bar::-webkit-scrollbar{display:none;}
.inv-slot{width:54px;height:54px;flex:0 0 auto;border-radius:14px;
  background:#fff;border:2px solid #eadbc0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;position:relative;font-size:24px;}
.inv-slot .qty{position:absolute;bottom:1px;right:4px;font-size:12px;font-weight:800;color:var(--ink);}
.inv-slot.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
.inv-empty{font-size:11px;opacity:.4;color:#999;}

/* tool indicator */
#tool-pill{position:fixed;right:calc(var(--safe-r) + 10px);
  bottom:calc(var(--safe-b) + 78px);background:rgba(255,249,236,.92);
  border:2px solid var(--panel-edge);border-radius:16px;padding:6px 10px;
  font-size:20px;box-shadow:0 3px 0 rgba(0,0,0,.12);}

/* [S4] Joystick --------------------------------------------------------- */
#joy{position:fixed;pointer-events:none;z-index:8;opacity:0;transition:opacity .15s ease;}
#joy.on{opacity:1;}
#joy .ring{position:absolute;width:120px;height:120px;border-radius:50%;
  border:3px solid rgba(255,255,255,.55);background:rgba(255,255,255,.12);
  transform:translate(-50%,-50%);}
#joy .knob{position:absolute;width:54px;height:54px;border-radius:50%;
  background:rgba(255,255,255,.8);border:2px solid rgba(255,255,255,.9);
  transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.2);}

/* [S5] Float popups / toasts / bubbles ---------------------------------- */
.float-pop{position:fixed;z-index:14;font-weight:800;font-size:16px;color:#fff;
  text-shadow:0 2px 3px rgba(0,0,0,.35);pointer-events:none;
  animation:floatUp 1s ease-out forwards;white-space:nowrap;}
@keyframes floatUp{0%{transform:translate(-50%,0);opacity:0;}
  15%{opacity:1;}100%{transform:translate(-50%,-46px);opacity:0;}}

#toast{position:fixed;left:50%;top:22%;transform:translateX(-50%);z-index:30;
  background:rgba(74,59,42,.94);color:#fff6da;padding:11px 18px;border-radius:16px;
  font-weight:700;font-size:14px;opacity:0;transition:opacity .3s,transform .3s;
  pointer-events:none;text-align:center;max-width:80vw;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(-6px);}

/* [S6] Overlays --------------------------------------------------------- */
.overlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:24px;color:#fff;}
#splash{background:linear-gradient(160deg,#cfe8ff,#ffe9c7);color:var(--ink);}
#splash .logo{font-size:42px;margin-bottom:6px;}
#splash h1{font-size:24px;margin-bottom:4px;}
#splash p{opacity:.75;margin-bottom:22px;font-size:14px;}
#bar-track{width:min(72vw,300px);height:14px;background:rgba(0,0,0,.1);border-radius:10px;overflow:hidden;}
#bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--leaf),#9fd86f);transition:width .25s;}
#splash .pct{margin-top:8px;font-size:12px;opacity:.7;}
#start-btn{margin-top:20px;padding:14px 30px;border:none;border-radius:18px;
  background:var(--leaf);color:#fff;font-size:18px;font-weight:800;
  box-shadow:0 4px 0 var(--leaf-dark);display:none;}
#start-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--leaf-dark);}

#portrait-lock{background:linear-gradient(160deg,#2b3a67,#4a5b8f);display:none;}
#portrait-lock .rot{font-size:64px;animation:roth 1.6s ease-in-out infinite;}
@keyframes roth{0%,100%{transform:rotate(0);}50%{transform:rotate(-90deg);}}
#fallback{background:#2b3a67;display:none;}

/* generic modal panel */
.modal{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(40,30,20,.45);padding:calc(var(--safe-t) + 14px) 14px calc(var(--safe-b) + 14px);}
.modal.on{display:flex;}
.panel{background:var(--panel);border:3px solid var(--panel-edge);border-radius:22px;
  width:100%;max-width:380px;max-height:100%;overflow-y:auto;padding:18px;
  box-shadow:0 8px 0 rgba(0,0,0,.15);}
.panel h2{font-size:20px;margin-bottom:12px;text-align:center;color:var(--leaf-dark);}
.panel .close{position:sticky;top:0;float:right;width:34px;height:34px;border-radius:50%;
  border:2px solid var(--panel-edge);background:#fff;font-size:18px;font-weight:800;color:var(--ink);}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:11px 4px;border-bottom:1px dashed #e7d6b0;font-size:14px;font-weight:600;}
.row:last-child{border-bottom:none;}
.row input[type=range]{flex:1;accent-color:var(--leaf);}
.btn{padding:10px 16px;border:none;border-radius:14px;background:var(--leaf);color:#fff;
  font-weight:800;font-size:14px;box-shadow:0 3px 0 var(--leaf-dark);}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--leaf-dark);}
.btn.sec{background:#e7c98f;box-shadow:0 3px 0 #c9a85f;color:var(--ink);}
.btn.wide{width:100%;margin-top:6px;}
.switch{width:50px;height:28px;border-radius:16px;background:#ccc;position:relative;transition:background .2s;flex:0 0 auto;}
.switch.on{background:var(--leaf);}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
  background:#fff;transition:left .2s;}
.switch.on::after{left:25px;}
.text-in{flex:1;padding:8px 10px;border:2px solid var(--panel-edge);border-radius:10px;font-size:14px;}

/* collection / recipe grid */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.cell{aspect-ratio:1;background:#fff;border:2px solid #eadbc0;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;position:relative;}
.cell .lbl{font-size:9px;font-weight:700;opacity:.7;margin-top:2px;}
.cell.locked{filter:grayscale(1);opacity:.45;}
.cell.locked .icon{filter:blur(2px);}
.cell .check{position:absolute;top:2px;right:4px;font-size:12px;}

/* dialog/recipe choice list */
.choice{display:flex;align-items:center;gap:10px;padding:12px;border:2px solid #eadbc0;
  border-radius:14px;margin-bottom:8px;background:#fff;font-size:15px;font-weight:700;}
.choice .ic{font-size:24px;}
.choice .meta{font-size:11px;font-weight:600;opacity:.7;margin-left:auto;}
.choice.dim{opacity:.45;}

/* [S7] character creator */
.swatches{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:8px 0 4px;}
.sw{width:40px;height:40px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px #ddd;}
.sw.sel{box-shadow:0 0 0 3px var(--leaf);}

/* [S8] onboarding / save / confetti ------------------------------------ */
#tip{position:fixed;z-index:20;background:rgba(74,59,42,.94);color:#fff6da;
  padding:9px 13px;border-radius:14px;font-size:13px;font-weight:600;max-width:230px;
  opacity:0;transition:opacity .3s;pointer-events:none;}
#tip.on{opacity:1;}
#tip::after{content:'';position:absolute;left:24px;bottom:-8px;border:8px solid transparent;
  border-top-color:rgba(74,59,42,.94);}
#save-dot{position:fixed;bottom:calc(var(--safe-b) + 74px);left:calc(var(--safe-l) + 12px);
  z-index:15;font-size:18px;opacity:0;transition:opacity .25s;pointer-events:none;}
#save-dot.on{opacity:.9;}
.confetti{position:fixed;z-index:60;width:9px;height:14px;pointer-events:none;border-radius:2px;}

/* speech bubble (DOM, anchored to projected 3D pos) */
.bubble{position:fixed;z-index:16;background:#fff;border:2px solid var(--panel-edge);
  border-radius:14px;padding:8px 12px;font-size:13px;font-weight:600;max-width:180px;
  color:var(--ink);transform:translate(-50%,-100%);pointer-events:none;
  box-shadow:0 3px 6px rgba(0,0,0,.18);transition:opacity .2s;}
.bubble::after{content:'';position:absolute;left:50%;bottom:-8px;margin-left:-7px;
  border:7px solid transparent;border-top-color:#fff;}

/* zoom controls (pinch also supported) */
#zoom-ctrl{position:fixed;right:calc(var(--safe-r) + 12px);bottom:calc(var(--safe-b) + 140px);
  display:flex;flex-direction:column;gap:8px;z-index:11;}
#zoom-ctrl button{width:44px;height:44px;border-radius:50%;border:2px solid var(--panel-edge);
  background:rgba(255,249,236,.92);font-size:22px;font-weight:800;color:var(--ink);
  box-shadow:0 3px 0 rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;}
#zoom-ctrl button:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.12);}

/* fishing mini-game */
.fish-meta{text-align:center;font-size:13px;opacity:.85;margin-bottom:6px;}
.fish-track{position:relative;height:36px;background:#e7f0f7;border:2px solid var(--panel-edge);
  border-radius:14px;overflow:hidden;margin:12px 0 8px;}
.fish-zone{position:absolute;top:0;bottom:0;background:rgba(106,168,79,.55);
  border-left:2px solid #3f6f33;border-right:2px solid #3f6f33;}
.fish-marker{position:absolute;top:-2px;width:8px;height:40px;background:#ff5d5d;border-radius:4px;
  box-shadow:0 0 6px rgba(0,0,0,.35);}
.fish-bar{height:18px;background:#eee;border-radius:10px;overflow:hidden;border:2px solid var(--panel-edge);}
.fish-fill{height:100%;width:25%;background:linear-gradient(90deg,#6aa84f,#9fd86f);transition:width .08s linear;}
.fish-timer{height:6px;background:#eee;border-radius:4px;overflow:hidden;margin-top:8px;}
.fish-timer>div{height:100%;width:100%;background:#ff9f43;}
#fish-tap{width:100%;margin-top:14px;padding:16px;font-size:18px;}
.fish-flash{animation:fishFlash .25s ease-out;}
@keyframes fishFlash{0%{filter:brightness(1.7)}100%{filter:brightness(1)}}

/* minimap */
#minimap{position:fixed;right:calc(var(--safe-r) + 10px);top:calc(var(--safe-t) + 66px);
  width:96px;height:96px;border-radius:50%;border:2px solid var(--panel-edge);
  background:rgba(255,249,236,.7);box-shadow:0 3px 0 rgba(0,0,0,.12);z-index:11;}

/* decoration edit toolbar */
#decor-bar{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(var(--safe-b) + 74px);display:none;gap:8px;align-items:center;
  background:rgba(255,249,236,.95);border:2px solid var(--panel-edge);border-radius:18px;
  padding:8px;max-width:94vw;overflow-x:auto;scrollbar-width:none;z-index:13;}
#decor-bar::-webkit-scrollbar{display:none;}
.db-item{width:48px;height:48px;flex:0 0 auto;border-radius:12px;background:#fff;border:2px solid #eadbc0;
  display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;}
.db-item.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
.db-item .db-q{position:absolute;bottom:0;right:3px;font-size:11px;font-weight:800;}
.db-msg{font-size:12px;font-weight:600;opacity:.7;padding:0 8px;}
.db-done{flex:0 0 auto;padding:10px 14px;border:none;border-radius:12px;background:var(--leaf);
  color:#fff;font-weight:800;box-shadow:0 3px 0 var(--leaf-dark);}

/* photo mode exit */
#photo-exit{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--safe-b) + 16px);
  display:none;z-index:70;padding:12px 20px;border:none;border-radius:16px;
  background:rgba(74,59,42,.9);color:#fff6da;font-weight:700;font-size:14px;}

/* object/building name labels (transparent bg, readable text) */
#labels{position:fixed;inset:0;pointer-events:none;}
.obj-label{position:absolute;transform:translate(-50%,-100%);pointer-events:none;
  background:rgba(40,30,20,.32);color:#fff;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:10px;white-space:nowrap;
  text-shadow:0 1px 2px rgba(0,0,0,.85),0 0 2px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.18);will-change:left,top,opacity;}
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<!-- ===================== HUD (in-game) ===================== -->
<div id="ui-root" style="display:none">
  <div id="coin-pill" class="hud-pill">🪙 <span id="coin-val">0</span></div>
  <div id="energy-wrap"><div id="energy-fill"></div></div>
  <div id="day-pill" class="hud-pill"><span id="day-line">Hari 1 · Semi</span><small id="time-line">Pagi · ☀️</small></div>
  <button id="menu-btn">☰</button>
  <div id="tool-pill">✋</div>
  <div id="zoom-ctrl"><button id="zoom-in">＋</button><button id="zoom-out">－</button><button id="photo-btn">📷</button></div>
  <canvas id="minimap" width="120" height="120"></canvas>
  <div id="inv-bar"></div>
  <div id="decor-bar"></div>
  <div id="save-dot">💾</div>
  <div id="tip"></div>
  <div id="labels"></div>
</div>
<button id="photo-exit">📷 Keluar Mode Foto</button>

<!-- joystick -->
<div id="joy"><div class="ring"></div><div class="knob"></div></div>

<!-- toast -->
<div id="toast"></div>

<!-- ===================== Splash / Loading ===================== -->
<div id="splash" class="overlay">
  <div class="logo">🌱🍳</div>
  <h1>Kebun &amp; Restoran Cozy</h1>
  <p>Bertani · Beternak · Memasak · Bersantai</p>
  <div id="bar-track"><div id="bar-fill"></div></div>
  <div class="pct" id="bar-pct">Memuat… 0%</div>
  <button id="start-btn">Main 🌿</button>
</div>

<!-- portrait lock -->
<div id="portrait-lock" class="overlay">
  <div class="rot">📱</div>
  <h1 style="margin-top:12px">Putar HP-mu</h1>
  <p>Game ini paling nyaman dimainkan tegak 🌱</p>
</div>

<!-- WebGL fallback -->
<div id="fallback" class="overlay">
  <div style="font-size:48px">😢</div>
  <h1 style="margin-top:10px">WebGL tidak didukung</h1>
  <p>Coba buka di browser modern (Chrome, Safari, Firefox terbaru) ya.</p>
</div>

<!-- modals injected/toggled by UIManager -->
<div id="modal-settings" class="modal"><div class="panel" id="settings-body"></div></div>
<div id="modal-notebook" class="modal"><div class="panel" id="notebook-body"></div></div>
<div id="modal-recipe" class="modal"><div class="panel" id="recipe-body"></div></div>
<div id="modal-choice" class="modal"><div class="panel" id="choice-body"></div></div>
<div id="modal-creator" class="modal"><div class="panel" id="creator-body"></div></div>
<div id="modal-fishing" class="modal"><div class="panel" id="fishing-body"></div></div>

<!-- Three.js via importmap (CDN, ESM) -->
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0"
  }
}
</script>


<script type="module">
/* =====================================================================
   COZY FARM & RESTAURANT — MAIN SCRIPT
   ---------------------------------------------------------------------
   Fusi Animal Crossing (santai, koleksi, karakter) × Story of Seasons
   (kedalaman bertani/beternak/memasak/musim). Three.js, primitive-only.

   TABLE OF CONTENTS
     [0] Imports & global constants
     [1] Util          — math, tween engine, particles, dom helpers
     [2] Audio         — Web Audio ambient music + layered SFX
     [3] GameState     — runtime data + default save schema
     [4] SaveManager   — versioned localStorage, debounced autosave
     [5] SceneSetup    — renderer, isometric smooth-follow camera, lights
     [6] DayCycle      — time/season/weather, sky+fog color transitions
     [7] Builders      — primitive asset factories (player, animals, props)
     [8] World         — assemble scene objects & registries
     [9] InputController — joystick + tap/drag disambiguation + raycast
     [10] Systems      — Farming, Animal, Cooking, NPC/Economy
     [11] UIManager    — HUD, popups, panels, onboarding, juice
     [12] Game         — bootstrap + main loop (clock.getDelta)
   ===================================================================== */

import * as THREE from 'three';

/* [0] Global constants -------------------------------------------------- */
const TILE = 2;                       // world units per farm tile
const DAY_LENGTH = 360;               // real seconds per in-game day (~6 min)
const SEASONS = ['Semi','Panas','Gugur','Dingin'];
const SEASON_DAYS = 3;                // in-game days per season (demo)
const SEASON_EMOJI = {Semi:'🌸',Panas:'☀️',Gugur:'🍂',Dingin:'❄️'};

// Crop catalog. season=null → tumbuh semua musim.
const CROPS = {
  wortel:   {name:'Wortel',   emoji:'🥕', grow:16, sell:14, season:'Gugur',  color:0xff8c2b, fruit:0xff8c2b},
  tomat:    {name:'Tomat',    emoji:'🍅', grow:18, sell:16, season:'Panas',  color:0xff4d4d, fruit:0xff4d4d},
  stroberi: {name:'Stroberi', emoji:'🍓', grow:22, sell:22, season:'Semi',   color:0xff5d7a, fruit:0xff2d55},
  jagung:   {name:'Jagung',   emoji:'🌽', grow:26, sell:20, season:'Panas',  color:0xffd84d, fruit:0xffd84d},
};
const SEEDS = {
  wortel:{cost:6}, tomat:{cost:7}, stroberi:{cost:9}, jagung:{cost:8}
};
// Animal products
const PRODUCTS = {
  susu:{name:'Susu', emoji:'🥛', sell:18}, telur:{name:'Telur', emoji:'🥚', sell:12},
  wol:{name:'Wol', emoji:'🧶', sell:24}, daging:{name:'Daging', emoji:'🥩', sell:30},
};
// Recipes
const RECIPES = {
  salad:    {name:'Salad',    emoji:'🥗', need:{tomat:1,wortel:1},  sell:48,  unlock:'start'},
  smoothie: {name:'Smoothie', emoji:'🥤', need:{stroberi:1,susu:1}, sell:54,  unlock:'start'},
  omelet:   {name:'Omelet',   emoji:'🍳', need:{telur:1,susu:1},    sell:60,  unlock:'egg'},

/* ====================================================================== */
/* [1] Util                                                               */
/* ====================================================================== */
const Util = {
  clamp:(v,a,b)=>Math.max(a,Math.min(b,v)),
  lerp:(a,b,t)=>a+(b-a)*t,
  // frame-rate independent smoothing factor
  damp:(a,b,lambda,dt)=>Util.lerp(a,b,1-Math.exp(-lambda*dt)),
  rand:(a,b)=>a+Math.random()*(b-a),
  randInt:(a,b)=>Math.floor(Util.rand(a,b+1)),
  pick:arr=>arr[Math.floor(Math.random()*arr.length)],
  lerpColor:(c1,c2,t)=>{const a=new THREE.Color(c1),b=new THREE.Color(c2);return a.lerp(b,t);},
  $:s=>document.querySelector(s),
  $$:s=>Array.from(document.querySelectorAll(s)),
};

/* Tiny tween engine — drives squash/stretch & misc eased motion.
   Each tween: {obj,key?,from,to,dur,t,ease,onUpdate,onDone}. */
const Tween = {
  list:[],
  to(opts){ opts.t=0; opts.ease=opts.ease||(x=>1-Math.pow(1-x,3)); this.list.push(opts); return opts; },
  // squash-stretch pop used everywhere for "juicy" feedback
  pop(obj3d, scale=1.15, dur=0.15){
    const base=obj3d.userData._baseScale||(obj3d.userData._baseScale=obj3d.scale.x);
    this.to({dur, onUpdate:(p)=>{
      const s = p<0.5 ? Util.lerp(base, base*scale, p/0.5) : Util.lerp(base*scale, base, (p-0.5)/0.5);
      obj3d.scale.setScalar(s);
    }, onDone:()=>obj3d.scale.setScalar(base)});
  },
  update(dt){
    for(let i=this.list.length-1;i>=0;i--){
      const tw=this.list[i]; tw.t+=dt;
      const p=Util.clamp(tw.t/tw.dur,0,1), e=tw.ease(p);
      if(tw.onUpdate) tw.onUpdate(e,p);
      if(tw.key!==undefined && tw.obj) tw.obj[tw.key]=Util.lerp(tw.from,tw.to,e);
      if(p>=1){ if(tw.onDone) tw.onDone(); this.list.splice(i,1); }
    }
  }
};

/* GPU-light particle bursts (small pooled point sprites in 3D). */
class Particles{
  constructor(scene){ this.scene=scene; this.items=[]; }
  burst(pos, color=0xffffff, count=5, opts={}){
    for(let i=0;i<count;i++){
      const g=new THREE.SphereGeometry(opts.size||0.08,5,4);
      const m=new THREE.MeshBasicMaterial({color, transparent:true});
      const p=new THREE.Mesh(g,m); p.position.copy(pos);
      const ang=Math.random()*Math.PI*2, sp=Util.rand(0.6,1.6)*(opts.spread||1);
      p.userData={vx:Math.cos(ang)*sp, vy:Util.rand(1.2,2.4), vz:Math.sin(ang)*sp, life:0, max:Util.rand(.5,.8)};
      this.scene.add(p); this.items.push(p);
    }
  }
  update(dt){
    for(let i=this.items.length-1;i>=0;i--){
      const p=this.items[i],u=p.userData; u.life+=dt;
      p.position.x+=u.vx*dt; p.position.y+=u.vy*dt; p.position.z+=u.vz*dt;
      u.vy-=4*dt; p.material.opacity=1-(u.life/u.max);
      const s=Util.clamp(1-(u.life/u.max),0,1); p.scale.setScalar(s);
      if(u.life>=u.max){ this.scene.remove(p); p.geometry.dispose(); p.material.dispose(); this.items.splice(i,1); }
    }
  }
}

/* [2] Audio — Web Audio generated ambient + layered SFX                  */
/*     TODO: ganti dengan file musik asli untuk versi final.              */
/* ====================================================================== */
const Audio = {
  ctx:null, musicGain:null, sfxGain:null, musicOn:true, _seq:null,
  vol:{music:0.4, sfx:0.7},
  init(){
    if(this.ctx) return;
    try{
      const AC = window.AudioContext||window.webkitAudioContext;
      this.ctx = new AC();
      this.musicGain=this.ctx.createGain(); this.musicGain.gain.value=this.vol.music;
      this.sfxGain=this.ctx.createGain(); this.sfxGain.gain.value=this.vol.sfx;
      this.musicGain.connect(this.ctx.destination);
      this.sfxGain.connect(this.ctx.destination);
    }catch(e){ console.warn('Audio unavailable',e); }
  },
  resume(){ if(this.ctx && this.ctx.state==='suspended') this.ctx.resume(); },
  setVol(kind,v){ this.vol[kind]=v;
    if(kind==='music'&&this.musicGain) this.musicGain.gain.value=v;
    if(kind==='sfx'&&this.sfxGain) this.sfxGain.gain.value=v; },
  // one short tone with envelope
  blip(freq, dur=0.12, type='sine', dest=null, gain=0.5){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.value=freq;
    const t=this.ctx.currentTime;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(dest||this.sfxGain); o.start(t); o.stop(t+dur+0.02);
  },
  // SFX library
  sfx(name){
    if(!this.ctx) return;
    switch(name){
      case 'pop':   this.blip(620,0.09,'triangle',null,0.5); break;
      case 'plant': this.blip(330,0.12,'sine'); this.blip(440,0.1,'sine'); break;
      case 'water': this.blip(220,0.18,'sine',null,0.3); break;
      case 'harvest': this.blip(660,0.1,'triangle'); setTimeout(()=>this.blip(880,0.12,'triangle'),70); break;
      case 'coin':  this.blip(880,0.07,'square',null,0.35); setTimeout(()=>this.blip(1175,0.1,'square',null,0.35),60); break;
      case 'cook':  this.blip(300,0.4,'sawtooth',null,0.18); break;
      case 'done':  [523,659,784].forEach((f,i)=>setTimeout(()=>this.blip(f,0.14,'triangle'),i*90)); break;
      case 'animal':this.blip(Util.rand(280,360),0.18,'sine',null,0.4); break;
      case 'step':  this.blip(160,0.05,'sine',null,0.12); break;
      case 'heart': this.blip(700,0.08,'sine'); setTimeout(()=>this.blip(900,0.1,'sine'),60); break;
      case 'milestone':[523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.blip(f,0.18,'triangle'),i*110)); break;
    }
  },
  // gentle ambient: slow arpeggio over a pad, pentatonic so it never clashes
  startMusic(){
    if(!this.ctx||this._seq) return;
    const scale=[261.6,293.7,329.6,392,440,523.2];
    let i=0;
    const step=()=>{
      if(!this.musicOn){ this._seq=setTimeout(step,1500); return; }
      const f=scale[i%scale.length]; i++;
      this.blip(f, 1.4, 'sine', this.musicGain, 0.25);
      if(i%3===0) this.blip(f/2,1.8,'triangle',this.musicGain,0.12);
      this._seq=setTimeout(step, Util.rand(650,950));
    };
    step();
  },
  toggleMusic(on){ this.musicOn=on; }
};

/* ====================================================================== */
/* [4] SaveManager — versioned localStorage + debounced autosave          */
/* ====================================================================== */
const SaveManager = {
  _timer:null, _mem:null, _failed:false,
  load(){
    try{
      const raw=localStorage.getItem(SAVE_KEY);
      if(!raw) return defaultSave();
      let data=JSON.parse(raw);
      data=this.migrate(data);
      data=Object.assign(defaultSave(), data); // fill any missing top-level keys
      // deep-fill nested objects so older saves still receive new keys
      data.tools=Object.assign({watering:1,rod:1,shoes:0}, data.tools);
      data.settings=Object.assign({music:0.4,sfx:0.7,haptic:true,sensitivity:1.0,zoom:1.0}, data.settings);
      data.notebook=Object.assign({crops:{},recipes:{},animals:{},fish:{},bugs:{},fossils:{}}, data.notebook);
      data.decorInv=data.decorInv||{};
      data.placedDecor=data.placedDecor||[];
      // migrate legacy single-animal save → multi-animal ranch
      if(!data.ranch){
        const lg=data.animals||{};
        data.ranch={barnLevel:1,coopLevel:1,nextId:4,animals:[
          {id:1,type:'sapi', name:(lg.sapi&&lg.sapi.name)||null, mood:(lg.sapi&&lg.sapi.mood)||60, last:0,ready:false},
          {id:2,type:'ayam', name:(lg.ayam&&lg.ayam.name)||null, mood:(lg.ayam&&lg.ayam.mood)||60, last:0,ready:false},
          {id:3,type:'domba',name:(lg.domba&&lg.domba.name)||null,mood:(lg.domba&&lg.domba.mood)||60,last:0,ready:false},
        ]};
      }
      data.ranch.barnLevel=data.ranch.barnLevel||1;
      data.ranch.coopLevel=data.ranch.coopLevel||1;
      data.ranch.animals=data.ranch.animals||[];
      data.ranch.nextId=data.ranch.nextId||(data.ranch.animals.length+1);
      data.ranch.feeder=data.ranch.feeder||{fill:0,max:60};
      data.shopDeal=Object.assign({day:0,id:null}, data.shopDeal);
      data.stats=Object.assign({eggCollected:false,dishesCooked:0,fishCaught:0}, data.stats);
      data.totals=Object.assign({harvest:0,fish:0,cook:0,coins:0,pet:0,sold:0}, data.totals);
      data.quests=Object.assign({day:0,list:[],claimed:false}, data.quests);
      data.mailbox=Object.assign({lastClaim:0}, data.mailbox);
      data.achievements=data.achievements||{};
      data.friendGifts=Object.assign({sari:0,tono:0,mira:0}, data.friendGifts);
      return data;
    }catch(e){ console.warn('Load gagal, mulai baru',e); return defaultSave(); }
  },
  migrate(data){
    // future-proof migrations keyed by saveVersion
    if(!data.saveVersion || data.saveVersion<1){ data.saveVersion=1; }
    return data;
  },
  save(){
    try{
      localStorage.setItem(SAVE_KEY, JSON.stringify(GS.data));
      this._failed=false;
    }catch(e){
      // localStorage penuh/diblokir → fallback in-memory, beri tahu sekali
      this._mem=JSON.stringify(GS.data);
      if(!this._failed){ this._failed=true; UI.toast('⚠️ Gagal menyimpan ke perangkat — progres tetap aman selama sesi ini.'); }
    }
    UI.flashSave();
  },
  // debounce ~3s after important actions
  request(){ clearTimeout(this._timer); this._timer=setTimeout(()=>this.save(),3000); },
  reset(){ localStorage.removeItem(SAVE_KEY); }
};


/* ====================================================================== */
/* [5] SceneSetup — renderer, isometric smooth-follow camera, lights      */
/* ====================================================================== */
const SceneSetup = {
  renderer:null, scene:null, camera:null,
  camTarget:new THREE.Vector3(), lookAhead:new THREE.Vector3(),
  sun:null, ambient:null, hemi:null,
  baseD:13, zoom:1,
  init(canvas){
    this.renderer=new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); // perf cap
    this.renderer.shadowMap.enabled=true;
    this.renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    this.scene=new THREE.Scene();
    this.scene.fog=new THREE.Fog(0xcfe8ff, 34, 120);

    // Fixed isometric-ish camera (no OrbitControls). Ortho for clean low-poly look.
    this.zoom=(GS.data&&GS.data.settings&&GS.data.settings.zoom)||1;
    this.camera=new THREE.OrthographicCamera(-13,13,13,-13,0.1,200);
    this.camOffset=new THREE.Vector3(16,18,16); // 45° feel
    this.camera.position.copy(this.camOffset);
    this.camera.lookAt(0,0,0);

    // Lighting (kept cheap: 1 shadow-casting dir + hemi + ambient)
    this.sun=new THREE.DirectionalLight(0xffffff,1.1);
    this.sun.position.set(12,20,8); this.sun.castShadow=true;
    this.sun.shadow.mapSize.set(1024,1024);
    const s=30; const c=this.sun.shadow.camera;
    c.left=-s;c.right=s;c.top=s;c.bottom=-s;c.near=1;c.far=95;
    this.scene.add(this.sun);
    this.hemi=new THREE.HemisphereLight(0xffffff,0x8fbc8f,0.6); this.scene.add(this.hemi);
    this.ambient=new THREE.AmbientLight(0xffffff,0.35); this.scene.add(this.ambient);

    this.onResize();
    window.addEventListener('resize',()=>this.onResize());
    window.addEventListener('orientationchange',()=>setTimeout(()=>this.onResize(),200));
  },
  onResize(){ this.applyCamera(); },
  // recompute the ortho frustum from base size + zoom factor (zoom>1 = closer)
  applyCamera(){
    const w=window.innerWidth,h=window.innerHeight,aspect=w/h,d=this.baseD/this.zoom;
    this.camera.left=-d*aspect; this.camera.right=d*aspect;
    this.camera.top=d; this.camera.bottom=-d;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(w,h);
  },
  setZoom(z){
    this.zoom=Util.clamp(z,0.55,2.0);
    if(GS.data&&GS.data.settings){ GS.data.settings.zoom=this.zoom; SaveManager.request(); }
    this.applyCamera();
  },
  // smooth follow with subtle look-ahead toward movement direction
  follow(targetPos, moveDir, dt){
    this.lookAhead.lerp(moveDir.clone().multiplyScalar(2.4),0.06);
    const desired=targetPos.clone().add(this.lookAhead);
    this.camTarget.x=Util.damp(this.camTarget.x,desired.x,4,dt);
    this.camTarget.z=Util.damp(this.camTarget.z,desired.z,4,dt);
    this.camera.position.set(this.camTarget.x+this.camOffset.x,this.camOffset.y,this.camTarget.z+this.camOffset.z);
    this.camera.lookAt(this.camTarget.x,0.5,this.camTarget.z);
  }
};

/* ====================================================================== */
/* [6] DayCycle — time/season/weather + sky/fog/light color transitions   */
/* ====================================================================== */
const DayCycle = {
  rainGroup:null, starGroup:null, fireflyGroup:null,
  // key color stops across the day (t 0..1)
  stops:[
    {t:0.00, sky:0x2b3a67, amb:0x3a4a7a, sun:0x6a7bb0, sunI:0.35},  // night
    {t:0.22, sky:0xcfe8ff, amb:0xbfd6ff, sun:0xfff0c8, sunI:0.9},   // dawn/morning
    {t:0.45, sky:0xfff6da, amb:0xfff2cf, sun:0xffffff, sunI:1.15},   // midday
    {t:0.68, sky:0xffb877, amb:0xffd9a8, sun:0xffcaa0, sunI:1.0},    // golden hour
    {t:0.82, sky:0xa85b6e, amb:0xb07088, sun:0xd98aa0, sunI:0.55},   // dusk
    {t:1.00, sky:0x2b3a67, amb:0x3a4a7a, sun:0x6a7bb0, sunI:0.35},   // night
  ],
  init(){
    this.starGroup=new THREE.Group(); SceneSetup.scene.add(this.starGroup);
    this.fireflyGroup=new THREE.Group(); SceneSetup.scene.add(this.fireflyGroup);
    // stars
    for(let i=0;i<60;i++){
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.07,4,4),
        new THREE.MeshBasicMaterial({color:0xffffff,transparent:true}));
      const a=Math.random()*Math.PI*2,r=Util.rand(20,42);
      m.position.set(Math.cos(a)*r, Util.rand(14,30), Math.sin(a)*r);
      this.starGroup.add(m);
    }
    // fireflies near farm
    for(let i=0;i<14;i++){
      const m=new THREE.Mesh(new THREE.SphereGeometry(0.06,4,4),
        new THREE.MeshBasicMaterial({color:0xfff2a8,transparent:true}));
      m.position.set(Util.rand(-10,10),Util.rand(0.6,2.4),Util.rand(-10,10));
      m.userData.phase=Math.random()*Math.PI*2;
      this.fireflyGroup.add(m);
    }
    this.rainGroup=new THREE.Group(); SceneSetup.scene.add(this.rainGroup);
    for(let i=0;i<140;i++){
      const m=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.5,3),
        new THREE.MeshBasicMaterial({color:0xaecfe8,transparent:true,opacity:0.6}));
      m.position.set(Util.rand(-16,16),Util.rand(2,16),Util.rand(-16,16));
      this.rainGroup.add(m);
    }
    this.rainGroup.visible=false;
  },
  colorAt(t){
    const s=this.stops; let a=s[0],b=s[s.length-1];
    for(let i=0;i<s.length-1;i++){ if(t>=s[i].t&&t<=s[i+1].t){a=s[i];b=s[i+1];break;} }
    const f=(t-a.t)/Math.max(0.0001,(b.t-a.t));
    return {
      sky:Util.lerpColor(a.sky,b.sky,f),
      amb:Util.lerpColor(a.amb,b.amb,f),
      sun:Util.lerpColor(a.sun,b.sun,f),
      sunI:Util.lerp(a.sunI,b.sunI,f),
    };
  },
  update(dt){
    // advance time
    GS.data.timeOfDay += dt/DAY_LENGTH;
    let crossedNight=false;
    if(GS.data.timeOfDay>=1){ GS.data.timeOfDay-=1; } // wrap (sleeping is the real day-changer)
    const t=GS.data.timeOfDay;
    const c=this.colorAt(t);
    SceneSetup.scene.background=c.sky;
    SceneSetup.scene.fog.color.copy(c.sky);
    SceneSetup.ambient.color.copy(c.amb);
    SceneSetup.sun.color.copy(c.sun);
    SceneSetup.sun.intensity=c.sunI;
    // night visuals
    const nightAmt=Util.clamp(t<0.2?(0.2-t)/0.2:t>0.8?(t-0.8)/0.2:0,0,1);
    this.starGroup.children.forEach(m=>m.material.opacity=nightAmt);
    this.fireflyGroup.children.forEach((m,i)=>{
      m.material.opacity=nightAmt*(0.5+0.5*Math.sin(GS.time*2+m.userData.phase));
      m.position.y+=Math.sin(GS.time+i)*0.002;
    });
    // weather
    const raining=GS.data.weather==='hujan';
    this.rainGroup.visible=raining;
    if(raining){
      this.rainGroup.children.forEach(m=>{ m.position.y-=22*dt; if(m.position.y<0.3){m.position.y=Util.rand(10,16);m.position.x=Util.rand(-16,16);m.position.z=Util.rand(-16,16);} });
    }
    // time label (throttled ~2x/sec to avoid per-frame DOM writes)
    this._lblT=(this._lblT||0)+dt;
    if(this._lblT>0.5){ this._lblT=0; UI.updateDayLabel(t); }
  },
  label(t){
    if(t<0.2) return 'Malam · 🌙';
    if(t<0.35) return 'Pagi · 🌅';
    if(t<0.6) return 'Siang · ☀️';
    if(t<0.75) return 'Sore · 🌇';
    if(t<0.85) return 'Senja · 🌆';
    return 'Malam · 🌙';
  },
  isNight(){ const t=GS.data.timeOfDay; return t<0.2||t>0.82; },
  // called on sleep
  nextDay(){
    GS.data.day++;
    GS.data.timeOfDay=0.24;
    GS.data.greetedToday=[];
    // season rollover
    const idx=Math.floor((GS.data.day-1)/SEASON_DAYS)%SEASONS.length;
    GS.data.season=SEASONS[idx];
    // weather roll for new day
    const r=Math.random();
    GS.data.weather = r<0.25?'hujan' : r<0.5?'berawan' : 'cerah';
    // rain auto-waters all crops (cozy QoL)
    if(GS.data.weather==='hujan') GS.data.plots.forEach(p=>{ if(p.crop) p.watered=true; });
    // resolve shipping bin sales
    Economy.resolveShipping();
    // reset daily produce timers a bit so morning feels fresh
  }
};

/* [7] Builders — primitive asset factories (low-poly, flatShading)       */
/*     All characters use a chibi "villager" silhouette (big head, small  */
/*     body) to evoke Animal Crossing × Story of Seasons.                 */
/* ====================================================================== */
const HAIR_COLORS=[0x6b4423,0x2b2b2b,0xc98a3a,0xff8fab,0x8a5fc9,0xe9e9e9];
const OUTFIT_COLORS=[0x6aa84f,0x4d8af0,0xff7a5c,0xffcf4d,0xff8fab,0x9b6bd6];

/* ---- AC-style curved world ("tiny planet" horizon) -------------------
   A vertex-shader patch bends geometry downward the farther it is from a
   moving focal center (the camera target), so the world curves away toward
   the horizon like Animal Crossing. It is PURELY visual — gameplay/raycast
   coordinates stay flat (hitboxes & sky elements use unpatched materials). */
const Curve = {
  center:{value:new THREE.Vector3(0,0,0)},   // shared uniform; .xz is the focus
  strength:{value:0.021},                     // bend amount — higher = rounder "planet"
  // patch any MeshStandard/Basic material so its vertices curve in the shader
  patch(material){
    material.onBeforeCompile=(shader)=>{
      shader.uniforms.uCurveCenter=Curve.center;
      shader.uniforms.uCurveStrength=Curve.strength;
      shader.vertexShader='uniform vec3 uCurveCenter;\nuniform float uCurveStrength;\n'+shader.vertexShader;
      shader.vertexShader=shader.vertexShader.replace('#include <project_vertex>',
        'vec4 czLocal = vec4( transformed, 1.0 );\n'+
        '#ifdef USE_INSTANCING\n  czLocal = instanceMatrix * czLocal;\n#endif\n'+
        'vec4 czWorld = modelMatrix * czLocal;\n'+
        'float czD = distance( czWorld.xz, uCurveCenter.xz );\n'+
        'czWorld.y -= czD * czD * uCurveStrength;\n'+
        'vec4 mvPosition = viewMatrix * czWorld;\n'+
        'gl_Position = projectionMatrix * mvPosition;\n');
    };
    // keep patched programs distinct from unpatched ones in the cache
    material.customProgramCacheKey=()=>'curvedWorld';
    return material;
  }
};
// All ground-level world materials go through mat() → curved + low-poly look.
function mat(color,opts={}){ return Curve.patch(new THREE.MeshStandardMaterial({color,flatShading:true,roughness:0.85,...opts})); }
// Unpatched material for SKY elements (clouds) that must NOT curve downward.
function skyMat(color,opts={}){ return new THREE.MeshStandardMaterial({color,flatShading:true,...opts}); }

  build(){
    const sc=SceneSetup.scene;
    // ---- island world: ocean -> beach -> land (subdivided so curvature is smooth) ----
    const ocean=new THREE.Mesh(new THREE.PlaneGeometry(260,260,120,120),mat(0x4aa3d6,{transparent:true,opacity:0.95,roughness:0.2}));
    ocean.rotation.x=-Math.PI/2; ocean.position.y=-0.6; sc.add(ocean); this.ocean=ocean;
    const beach=new THREE.Mesh(new THREE.PlaneGeometry(90,90,60,60),mat(0xefdfa8));
    beach.rotation.x=-Math.PI/2; beach.position.y=-0.06; beach.receiveShadow=true; sc.add(beach);
    const land=new THREE.Mesh(new THREE.PlaneGeometry(78,78,110,110),mat(0x8fbc8f));
    land.rotation.x=-Math.PI/2; land.position.y=0; land.receiveShadow=true; sc.add(land); this.land=land;
    // darker lawn near the farm for subtle variation
    const lawn=new THREE.Mesh(new THREE.PlaneGeometry(34,40,20,24),mat(0x9ccb8a));
    lawn.rotation.x=-Math.PI/2; lawn.position.set(0,0.01,2); lawn.receiveShadow=true; sc.add(lawn);
    // ---- path ----
    const path=new THREE.Mesh(new THREE.PlaneGeometry(2.6,30,2,60),mat(0xd9c08a));
    path.rotation.x=-Math.PI/2; path.position.set(0,0.03,1); sc.add(path);

    // ---- forest ring of trees (some fruit-bearing) around the island edge ----
    const trees=[]; let ttry=0;
    while(trees.length<38 && ttry<2500){ ttry++;
      const a=Util.rand(0,6.28), r=Util.rand(18,34), x=Math.cos(a)*r, z=Math.sin(a)*r;
      if(Math.hypot(x,z)>35) continue;
      trees.push([x,z]);
    }
    trees.forEach(([x,z])=>{const t=(Math.random()<0.25)?Builders.fruitTree():Builders.tree();t.position.set(x,0,z);t.scale.setScalar(Util.rand(0.9,1.4));t.rotation.y=Util.rand(0,6.28);sc.add(t);});
    this.buildFence();
    this.buildGrass();
    // decorative detail — each isolated so a failure here can never blank the world
    ['buildFlowers','buildScatter','buildPond','buildLake','buildClouds','buildExtras','buildLandmarks'].forEach(fn=>{
      try{ this[fn](); }catch(e){ console.warn('Decor dilewati:',fn,e); }
    });

    // ---- player ----
    this.player=Builders.villager({hair:HAIR_COLORS[GS.data.customize.hair],outfit:OUTFIT_COLORS[GS.data.customize.outfit]});
    this.player.position.copy(this.playerPos); sc.add(this.player);

    // ---- farm plots (3x3 grid) ----
    const startX=-TILE, startZ=-7;
    for(let i=0;i<9;i++){
      const r=Math.floor(i/3),c=i%3;
      const p=Builders.plot();
      p.position.set(startX+c*TILE, 0, startZ+r*TILE);
      sc.add(p); this.plotMeshes.push(p);
      this.register(p,'plot',{index:i},1.9, TILE*0.95);
    }

    // ---- ranch: upgradeable barn + coop with buyable livestock ----
    this.buildRanch();

    // ---- kitchen ----
    const kitchen=Builders.kitchen(); kitchen.position.set(8,0,-5); sc.add(kitchen);
    this.register(kitchen,'kitchen',{},2.4,2.6); this.addLabel('🍳 Dapur', kitchen, 1.8);

    // ---- restaurant tables ----
    const tspots=[[8,3],[11,5]];
    tspots.forEach((p,i)=>{const t=Builders.restaurantTable();t.position.set(p[0],0,p[1]);sc.add(t);this.tables.push({obj:t,occupied:null});});
    this.addLabel('🍽️ Restoran', this.tables[0].obj, 1.6);

    // ---- shop & shipping bin ----
    const shop=Builders.shop(); shop.position.set(5,0,8); sc.add(shop);
    this.register(shop,'shop',{},2.2,2.4); this.addLabel('🛒 Toko', shop, 2.0);
    const bin=Builders.shippingBin(); bin.position.set(2,0,9); sc.add(bin); this.shipMesh=bin;
    this.register(bin,'shipping',{},1.8,1.6); this.addLabel('📦 Kotak Kirim', bin, 1.3);

    // ---- house + bed ----
    const house=Builders.house(); house.position.set(-6,0,8); sc.add(house); this.addLabel('🏠 Rumah', house, 3.6);
    const bed=Builders.bed(); bed.position.set(-6,0,11.5); sc.add(bed); this.bedMesh=bed;
    this.register(bed,'bed',{},2.0,2.0); this.addLabel('🛏️ Kasur (tidur)', bed, 1.2);

    // ---- wardrobe (customization) ----
    const wardrobe=new THREE.Mesh(new THREE.BoxGeometry(1,2,0.8),mat(0x9b6bd6));
    wardrobe.position.set(-3.6,1,8); wardrobe.castShadow=true; sc.add(wardrobe);
    this.register(wardrobe,'wardrobe',{},1.8,1.6); this.addLabel('👕 Lemari', wardrobe, 1.6);

    // ---- signboard with farm name ----
    const sign=Builders.signboard(); sign.position.set(0,0,12.5); sc.add(sign); this.signMesh=sign;
    this.register(sign,'sign',{},1.8,1.6); this.addLabel('🪧 Papan Nama', sign, 1.8);
    this.updateSign();

    // ---- NPCs ----
    const npcDefs=[
      {key:'sari',name:'Bibi Sari', pos:[6,0,11], hair:5, outfit:4, hat:0xff5d5d},
      {key:'tono',name:'Pak Tono', pos:[12,0,9], hair:1, outfit:1},
      {key:'mira',name:'Mira', pos:[-3,0,4], hair:3, outfit:5},
    ];
    npcDefs.forEach(d=>{
      const n=Builders.villager({hair:HAIR_COLORS[d.hair],outfit:OUTFIT_COLORS[d.outfit],hat:d.hat});
      n.position.set(...d.pos); n.userData.def=d; sc.add(n);
      this.npcObjs[d.key]=n;
      const entry=this.register(n,'npc',{key:d.key,name:d.name},2.2,1.8);
      // wander state so villagers gently pace around home -> the village feels alive
      n.userData.home=new THREE.Vector3(d.pos[0],0,d.pos[2]);
      n.userData.target=n.userData.home.clone();
      n.userData.entry=entry; n.userData.wait=Util.rand(1,4); n.userData.face=0;
    });

  // ---- ranch construction ----
  buildRanch(){
    const sc=SceneSetup.scene;
    const barn=Builders.coop(); barn.position.set(-9,0,-6.5); barn.scale.set(1.15,1.15,1.15); sc.add(barn); this.barnMesh=barn;
    this.register(barn,'barn',{},2.8,3.2); this.addLabel('🐄 Kandang', barn, 3.4);
    const coop=Builders.coop(); coop.position.set(-14.5,0,-5); coop.scale.set(0.7,0.7,0.7); sc.add(coop); this.coopMesh=coop;
    this.register(coop,'coop',{},2.4,2.2); this.addLabel('🐔 Kandang Ayam', coop, 2.2);
    // fenced paddock around the grazing yard
    this.buildPaddock();
    // feed trough (auto-feeder)
    const trough=Builders.trough(); trough.position.set(-12,0,0.6); sc.add(trough); this.troughMesh=trough;
    this.register(trough,'feeder',{},1.9,1.8); this.addLabel('🪣 Palung', trough, 1.2);

    // animals
    this.animalObjs={};
    GS.data.ranch.animals.forEach(a=>this.spawnAnimal(a));

  },
  buildPaddock(){
    // instanced low fence around rectangle, with a gate gap on the south side
    const x0=-16.8,x1=-6.8,z0=-3.6,z1=2.2, step=0.8, pts=[];
    for(let x=x0;x<=x1+0.01;x+=step){ pts.push([x,z0]); if(!(x>-12.4&&x<-10.4)) pts.push([x,z1]); } // gate gap
    for(let z=z0;z<=z1+0.01;z+=step){ pts.push([x0,z]); pts.push([x1,z]); }
    const inst=new THREE.InstancedMesh(new THREE.BoxGeometry(0.12,0.7,0.12),mat(0xc9a875),pts.length);
    const d=new THREE.Object3D();
    pts.forEach(([x,z],i)=>{ d.position.set(x,0.35,z); d.updateMatrix(); inst.setMatrixAt(i,d.matrix); });
    inst.castShadow=true; SceneSetup.scene.add(inst);
  },
  setTroughHay(on){ if(this.troughMesh&&this.troughMesh.userData.hay) this.troughMesh.userData.hay.visible=on; },
  // register a floating name label tied to an object (shown when player is near)
  addLabel(name, obj, y){
    const el=document.createElement('div'); el.className='obj-label'; el.textContent=name;
    el.style.opacity='0'; const cont=Util.$('#labels'); if(cont) cont.appendChild(el);
    this.labels.push({name, obj, y:y||2, el});
  },
  spawnAnimal(a){
    const build={sapi:'cow',domba:'sheep',ayam:'chicken'}[a.type];
    const m=Builders[build](); SceneSetup.scene.add(m);
    m.userData.animalId=a.id; this.animalObjs[a.id]=m;
    m.userData.entry=this.register(m,'animal',{id:a.id}, a.type==='ayam'?1.6:2.0, a.type==='ayam'?1.4:1.8);
  },
  layoutAnimals(){
    const mam=GS.data.ranch.animals.filter(a=>a.type!=='ayam');
    const chk=GS.data.ranch.animals.filter(a=>a.type==='ayam');
    mam.forEach((a,i)=>{ const m=this.animalObjs[a.id]; if(!m) return; const col=i%3,row=Math.floor(i/3);
      m.position.set(-11+col*1.9, 0, -2.6+row*1.9); m.userData.wt=null; });
    chk.forEach((a,i)=>{ const m=this.animalObjs[a.id]; if(!m) return; const col=i%3,row=Math.floor(i/3);
      m.position.set(-16+col*1.2, 0, -2.4+row*1.2); m.userData.wt=null; });
    GS.data.ranch.animals.forEach(a=>{ const m=this.animalObjs[a.id]; if(m&&m.userData.entry) m.userData.entry.hit.position.set(m.position.x,0.6,m.position.z); });
  },

  buildFence(){
    // small picket fence around the farm plots, with a gap as a gate (instanced)
    const pts=[]; const x0=-3.4,x1=3.4,z0=-8.4,z1=-1.6, step=0.7;
    for(let x=x0;x<=x1;x+=step){ pts.push([x,z0]); if(Math.abs(x)>0.8) pts.push([x,z1]); }
    for(let z=z0;z<=z1;z+=step){ pts.push([x0,z]); pts.push([x1,z]); }
    const inst=new THREE.InstancedMesh(new THREE.BoxGeometry(0.1,0.6,0.1),mat(0xf3ead3),pts.length);
    const d=new THREE.Object3D();
    pts.forEach(([x,z],i)=>{ d.position.set(x,0.3,z); d.updateMatrix(); inst.setMatrixAt(i,d.matrix); });
    inst.castShadow=true; SceneSetup.scene.add(inst);
  },
  buildGrass(){
    // InstancedMesh decorative grass tufts spread across the whole island
    const count=520;
    const inst=new THREE.InstancedMesh(new THREE.ConeGeometry(0.12,0.4,4),mat(0x6aa84f),count);
    const d=new THREE.Object3D();
    for(let i=0;i<count;i++){
      const x=Util.rand(-34,34),z=Util.rand(-34,34);
      if(this._clear(x,z)) d.position.set(x,0.2,z); else d.position.set(0,-60,0); // hide invalid below map
      d.rotation.y=Math.random()*Math.PI; d.scale.setScalar(Util.rand(0.7,1.4));
      d.updateMatrix(); inst.setMatrixAt(i,d.matrix);
    }
    SceneSetup.scene.add(inst);
  },

  // is (x,z) free of farm/path/buildings/pond/landmarks? (for scattering decor)
  _clear(x,z){
    if(Math.hypot(x,z)>33) return false;               // keep on the island
    if(Math.abs(x)<5 && z>-9 && z<13) return false;     // central farm + path band
    const occ=[[-9,-6,3.2],[8,-5,3.2],[5,8,3.2],[2,9,2.4],[-6,8,3.2],[-6,11.5,2.6],
      [8,3,2.4],[11,5,2.4],[6,11,2.2],[12,9,2.2],[-3,4,2.2],[-3.6,8,2],[0,12.5,2],
      [-9,-2.5,2.6],[-7,-1,2],[-11,-1.5,2],[13,-1,3.2],
      [-14,7,3],[16,14,4.5],[14,-8,2.5],[-15,-9,2.5],[10,-13,2.5],[-15,13,4]]; // buildings/pond/lake/landmarks
    for(const [ox,oz,r] of occ){ if(Math.hypot(x-ox,z-oz)<r) return false; }
    return true;
  },

  // instanced colorful flowers (stems + heads, per-instance color)
  buildFlowers(){
    const COLORS=[0xff5d7a,0xffd35e,0xff8fab,0xffffff,0x9b6bd6,0xff7a5c,0x6fd0ff];
    const pos=[]; let tries=0;
    while(pos.length<320 && tries<7000){ tries++; const x=Util.rand(-32,32),z=Util.rand(-32,32); if(this._clear(x,z)) pos.push([x,z]); }
    const n=pos.length, d=new THREE.Object3D(), col=new THREE.Color();
    const stems=new THREE.InstancedMesh(new THREE.CylinderGeometry(0.02,0.03,0.3,4),mat(0x4f8f3f),n);
    const heads=new THREE.InstancedMesh(new THREE.SphereGeometry(0.12,6,5),mat(0xffffff),n);
    pos.forEach(([x,z],i)=>{
      const s=Util.rand(0.8,1.3);
      d.position.set(x,0.15,z); d.scale.setScalar(s); d.updateMatrix(); stems.setMatrixAt(i,d.matrix);
      d.position.set(x,0.32+s*0.04,z); d.updateMatrix(); heads.setMatrixAt(i,d.matrix);
      heads.setColorAt(i, col.setHex(Util.pick(COLORS)));
    });
    if(heads.instanceColor) heads.instanceColor.needsUpdate=true;
    SceneSetup.scene.add(stems); SceneSetup.scene.add(heads);
  },

  // instanced rocks + bushes scattered in the meadow
  buildScatter(){
    const rPos=[],bPos=[]; let tries=0;
    while((rPos.length<44||bPos.length<36)&&tries<9000){ tries++;
      const x=Util.rand(-32,32),z=Util.rand(-32,32); if(!this._clear(x,z)) continue;
      if(rPos.length<44 && Math.random()<0.5) rPos.push([x,z]); else if(bPos.length<36) bPos.push([x,z]);
    }
    const d=new THREE.Object3D();
    const rocks=new THREE.InstancedMesh(new THREE.IcosahedronGeometry(0.35,0),mat(0x9a9a9a),rPos.length);
    rPos.forEach(([x,z],i)=>{ d.position.set(x,0.16,z); d.rotation.set(Util.rand(0,3),Util.rand(0,6),0); d.scale.setScalar(Util.rand(0.6,1.4)); d.updateMatrix(); rocks.setMatrixAt(i,d.matrix); });
    const bushes=new THREE.InstancedMesh(new THREE.SphereGeometry(0.5,7,6),mat(0x5a9840),bPos.length);
    bPos.forEach(([x,z],i)=>{ d.position.set(x,0.38,z); d.rotation.set(0,Util.rand(0,6),0); d.scale.set(Util.rand(0.8,1.4),Util.rand(0.7,1.1),Util.rand(0.8,1.4)); d.updateMatrix(); bushes.setMatrixAt(i,d.matrix); });
    rocks.castShadow=true; bushes.castShadow=true;
    SceneSetup.scene.add(rocks,bushes);
  },

  // landmarks that fill the wider island: well, windmill, scarecrow, benches,

  buildLandmarks(){

    for(let i=0;i<6;i++){

      bird.userData={cx:Util.rand(-14,14),cz:Util.rand(-14,14),phase:Util.rand(0,6.28),r:Util.rand(8,16),h:Util.rand(7,11),sp:Util.rand(0.2,0.4)};
      sc.add(bird); this.birds.push(bird);
    }
  },

  // per-frame decor animation (clouds drift, critters move, windmill spins, lamps glow)
  animateDecor(t){
    if(this.clouds) this.clouds.forEach(c=>{ c.position.x+=c.userData.speed*0.02; if(c.position.x>64) c.position.x=-64; });
    if(this.butterflies) this.butterflies.forEach(b=>{ const u=b.userData;
      b.position.x=u.cx+Math.cos(t*0.6+u.phase)*u.r; b.position.z=u.cz+Math.sin(t*0.6+u.phase)*u.r;
      b.position.y=1+Math.sin(t*3+u.phase)*0.3; b.rotation.y=t*2+u.phase;
      b.children.forEach((w,i)=>{ w.rotation.y=(i?1:-1)*(0.5+Math.sin(t*14)*0.5); }); });
    if(this.birds) this.birds.forEach(b=>{ const u=b.userData;
      b.position.x=u.cx+Math.cos(t*u.sp+u.phase)*u.r; b.position.z=u.cz+Math.sin(t*u.sp+u.phase)*u.r;
      b.position.y=u.h+Math.sin(t+u.phase)*0.6; b.rotation.y=-(t*u.sp+u.phase)+Math.PI/2;
      b.children.forEach((w,i)=>{ w.rotation.y=(i?1:-1)*(0.4+Math.sin(t*16+u.phase)*0.6); }); });
    if(this.windmill) this.windmill.rotation.z+=0.01;
    if(this.lamps){ const night=DayCycle.isNight(); this.lamps.forEach(m=>{ m.emissive.setHex(0xffcf6b); m.emissiveIntensity=night?1.4:0; }); }
  },

  // gentle NPC wandering near home so the village feels alive (hitbox kept in sync)
  updateNPCs(dt){
    Object.values(this.npcObjs).forEach(n=>{
      const u=n.userData; if(!u.home) return;
      const to=new THREE.Vector3(u.target.x-n.position.x,0,u.target.z-n.position.z);
      const dist=to.length();
      if(dist<0.25){
        u.wait-=dt;
        if(u.wait<=0){ u.wait=Util.rand(2,6);
          u.target.set(u.home.x+Util.rand(-2.2,2.2),0,u.home.z+Util.rand(-2.2,2.2)); }
      } else {
        to.normalize();
        n.position.x+=to.x*0.8*dt; n.position.z+=to.z*0.8*dt;
        const tf=Math.atan2(to.x,to.z); let df=tf-u.face;
        while(df>Math.PI)df-=Math.PI*2; while(df<-Math.PI)df+=Math.PI*2;
        u.face+=df*Math.min(1,8*dt); n.rotation.y=u.face;
      }
      // keep the raycast hitbox following the NPC
      if(u.entry){ u.entry.hit.position.set(n.position.x,0.6,n.position.z); }
    });
  },

  updateSign(){
    // redraw farm name as a canvas texture on the signboard
    const cv=document.createElement('canvas'); cv.width=256; cv.height=128;
    const ctx=cv.getContext('2d');
    ctx.fillStyle='#b98a55'; ctx.fillRect(0,0,256,128);
    ctx.fillStyle='#4a3b2a'; ctx.font='bold 26px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    const name=GS.data.farmName||'Kebun Cozy';
    ctx.fillText(name.length>14?name.slice(0,14):name,128,56);
    ctx.font='18px sans-serif'; ctx.fillText('🌱 Farm',128,92);
    const tex=new THREE.CanvasTexture(cv);
    this.signMesh.userData.board.material.map=tex;
    this.signMesh.userData.board.material.color.set(0xffffff);
    this.signMesh.userData.board.material.needsUpdate=true;
  },

  // refresh plant visuals for a plot
  refreshPlot(i){
    const p=this.plotMeshes[i], data=GS.data.plots[i];
    if(p.userData.plant){ p.remove(p.userData.plant); p.userData.plant=null; }
    p.userData.soil.material.color.set(data.tilled?0x7a5c3e:0x9b7653);
    if(data.watered) p.userData.soil.material.color.multiplyScalar(0.8);
    if(data.crop){
      let prog=data.grown?1:Util.clamp((GS.time-data.planted)/CROPS[data.crop].grow,0,1);
      const plant=Builders.plant(data.crop,prog);
      p.add(plant); p.userData.plant=plant;
    }
  }
};

/* [9] InputController — joystick + tap/drag disambiguation + raycast      */
/*     This is the most polish-critical system (one-finger mobile feel).  */
/* ====================================================================== */
const Input = {
  active:false, touchId:null,
  pinch:{active:false,startDist:0,startZoom:1},
  startX:0, startY:0, startT:0,
  originX:0, originY:0, curX:0, curY:0,
  dir:new THREE.Vector2(0,0),      // normalized camera-relative move (x,z)
  speed:0,                          // analog magnitude 0..1
  isDrag:false,
  DEAD:9, CLAMP:50, TAP_DIST:12, TAP_TIME:220,
  highlighted:null,
  autoWalk:null,                    // {pos,entry} when walking to interact

  el:null, joy:null, ring:null, knob:null,

  init(){
    this.el=Util.$('#game-canvas');
    this.joy=Util.$('#joy'); this.ring=this.joy.querySelector('.ring'); this.knob=this.joy.querySelector('.knob');
    // passive:false so we can preventDefault (block scroll/zoom)
    this.el.addEventListener('touchstart',e=>this.onStart(e),{passive:false});
    this.el.addEventListener('touchmove',e=>this.onMove(e),{passive:false});
    this.el.addEventListener('touchend',e=>this.onEnd(e),{passive:false});
    this.el.addEventListener('touchcancel',e=>this.onEnd(e),{passive:false});
    // desktop: wheel to zoom
    this.el.addEventListener('wheel',e=>{ e.preventDefault(); SceneSetup.setZoom(SceneSetup.zoom - Math.sign(e.deltaY)*0.12); },{passive:false});
    // mouse fallback for desktop testing
    this.el.addEventListener('mousedown',e=>this.onStart(this.fakeTouch(e)),{passive:false});
    window.addEventListener('mousemove',e=>{ if(this.active) this.onMove(this.fakeTouch(e)); });
    window.addEventListener('mouseup',e=>{ if(this.active) this.onEnd(this.fakeTouch(e)); });
  },
  fakeTouch(e){ return {preventDefault:()=>e.preventDefault?e.preventDefault():0,
    changedTouches:[{identifier:'mouse',clientX:e.clientX,clientY:e.clientY}],
    touches:[{identifier:'mouse',clientX:e.clientX,clientY:e.clientY}]}; },

  // ---- two-finger pinch zoom (cancels any active joystick) ----
  startPinch(e){
    e.preventDefault();
    this.pinch.active=true;
    this.active=false; this.touchId=null; this.isDrag=false;
    this.dir.set(0,0); this.speed=0; this.joy.classList.remove('on'); this.clearHighlight();
    const a=e.touches[0], b=e.touches[1];
    this.pinch.startDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    this.pinch.startZoom=SceneSetup.zoom;
  },
  movePinch(e){
    if(!e.touches||e.touches.length<2) return;
    e.preventDefault();
    const a=e.touches[0], b=e.touches[1];
    const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    SceneSetup.setZoom(this.pinch.startZoom*(d/Math.max(1,this.pinch.startDist)));
  },

  // ignore touches that begin on DOM HUD elements
  onHUD(x,y){
    const el=document.elementFromPoint(x,y);
    return el && el.closest && el.closest('#ui-root, .modal, #menu-btn, #inv-bar, #toast');
  },

  onStart(e){
    if(e.touches && e.touches.length>=2){ this.startPinch(e); return; }  // two fingers = zoom
    if(this.active) return;                    // single-touch lock
    const t=e.changedTouches[0];
    if(this.onHUD(t.clientX,t.clientY)) return; // HUD handles its own taps
    e.preventDefault();
    Audio.resume();                            // unlock audio on first gesture
    this.active=true; this.touchId=t.identifier;
    this.startX=this.curX=this.originX=t.clientX;
    this.startY=this.curY=this.originY=t.clientY;
    this.startT=performance.now(); this.isDrag=false;
    // place joystick at touch origin
    this.joy.style.left=this.originX+'px'; this.joy.style.top=this.originY+'px';
    this.ring.style.left='0px'; this.ring.style.top='0px';
    this.knob.style.left='0px'; this.knob.style.top='0px';
  },

  onMove(e){
    if(this.pinch.active){ this.movePinch(e); return; }
    if(!this.active) return;
    const t=this.findTouch(e); if(!t) return;
    e.preventDefault();
    this.curX=t.clientX; this.curY=t.clientY;
    const dx=this.curX-this.startX, dy=this.curY-this.startY;
    const dist=Math.hypot(dx,dy);
    if(!this.isDrag && dist>this.TAP_DIST){ this.isDrag=true; this.joy.classList.add('on'); this.autoWalk=null; }
    if(this.isDrag){
      this.updateJoystick(this.curX-this.originX, this.curY-this.originY);
    } else {
      // not yet a drag → live raycast highlight for tap precision
      this.updateHighlight(this.curX,this.curY);
    }
  },

  onEnd(e){
    if(this.pinch.active){ if(e.preventDefault)e.preventDefault(); if(!e.touches||e.touches.length<2) this.pinch.active=false; return; }
    const t=this.findTouch(e); if(!t) return;
    e.preventDefault();
    const dx=this.curX-this.startX, dy=this.curY-this.startY;
    const dist=Math.hypot(dx,dy), dur=performance.now()-this.startT;
    if(!this.isDrag && dist<this.TAP_DIST && dur<this.TAP_TIME){
      this.handleTap(this.startX,this.startY);   // genuine tap
    }
    // reset
    this.active=false; this.touchId=null; this.isDrag=false;
    this.dir.set(0,0); this.speed=0;
    this.joy.classList.remove('on');
    this.clearHighlight();
  },

  findTouch(e){
    const list=e.changedTouches||e.touches;
    for(const t of list) if(t.identifier===this.touchId) return t;
    return null;
  },

  // map screen offset → clamped knob + camera-relative normalized direction
  updateJoystick(ox,oy){
    let len=Math.hypot(ox,oy);
    if(len>this.CLAMP){ ox*=this.CLAMP/len; oy*=this.CLAMP/len; len=this.CLAMP; }
    this.knob.style.left=ox+'px'; this.knob.style.top=oy+'px';
    if(len<this.DEAD){ this.dir.set(0,0); this.speed=0; return; }
    // analog speed: partial pull = slower
    this.speed=Util.clamp((len-this.DEAD)/(this.CLAMP-this.DEAD),0,1)*GS.data.settings.sensitivity;
    // screen vector → world, accounting for 45° iso camera
    const nx=ox/len, ny=oy/len;          // screen dir (y down)
    // camera basis projected onto ground:
    // "up the screen" = -Z-ish rotated 45°. Compute from camera.
    const fwd=new THREE.Vector3(); SceneSetup.camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
    const right=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
    // screen up (-ny) → forward, screen right (nx) → right
    const move=new THREE.Vector3()
      .addScaledVector(right, nx)
      .addScaledVector(fwd, -ny);
    move.normalize();
    this.dir.set(move.x,move.z);
  },

  // raycast highlight (emissive glow) on pointed object
  updateHighlight(x,y){
    const entry=this.raycastEntry(x,y);
    if(entry===this.highlighted) return;
    this.clearHighlight();
    if(entry){ this.highlighted=entry; this.setGlow(entry.root,true); }
  },
  clearHighlight(){ if(this.highlighted){ this.setGlow(this.highlighted.root,false); this.highlighted=null; } },
  setGlow(root,on){
    root.traverse(o=>{ if(o.isMesh&&o.material&&o.material.emissive){
      o.material.emissive.set(on?0x444422:0x000000);
    }});
  },

  raycastEntry(x,y){
    const ndc=new THREE.Vector2((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
    World.raycaster.setFromCamera(ndc,SceneSetup.camera);
    const hits=World.raycaster.intersectObjects(World.interactables.map(e=>e.hit),false);
    if(hits.length) return hits[0].object.userData.entry;
    return null;
  },

  // a tap → find target; if in range act, else auto-walk-to-interact
  handleTap(x,y){
    // decoration edit mode: tap ground to place, or tap a placed item to pick up
    if(Decor.editing){
      const p=this.groundPoint(x,y);
      if(p){ if(!Decor.pickupNear(p.x,p.z)) Decor.placeAt(p.x,p.z); }
      return;
    }
    const entry=this.raycastEntry(x,y);
    if(!entry) return;
    const d=World.player.position.distanceTo(entry.root.position);
    if(d<=entry.range){
      Interactions.run(entry);
    } else {
      // auto-walk toward it, then act on arrival (ala Animal Crossing)
      this.autoWalk={target:entry.root.position.clone(), entry};
    }
  },
  // raycast the ground plane → world point (logical flat coords)
  groundPoint(x,y){
    if(!World.land) return null;
    const ndc=new THREE.Vector2((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1);
    World.raycaster.setFromCamera(ndc,SceneSetup.camera);
    const hit=World.raycaster.intersectObject(World.land,false)[0];
    return hit?hit.point:null;
  }
};

const Inv={
  add(id,n=1){ GS.data.inventory[id]=(GS.data.inventory[id]||0)+n; UI.renderInventory(); SaveManager.request(); },
  remove(id,n=1){ if((GS.data.inventory[id]||0)<n) return false; GS.data.inventory[id]-=n; if(GS.data.inventory[id]<=0) delete GS.data.inventory[id]; UI.renderInventory(); SaveManager.request(); return true; },

  emojiOf(id){ return CROPS[id]?.emoji||PRODUCTS[id]?.emoji||RECIPES[id]?.emoji||FISH[id]?.emoji||BUGS[id]?.emoji||FOSSILS[id]?.emoji||(id.startsWith('benih_')?'🌰':'❓'); },
};

/* ---- Energy ---- */
const Energy={
  spend(n){ GS.data.energy=Util.clamp(GS.data.energy-n,0,100); UI.updateEnergy(); },
  restore(n){ GS.data.energy=Util.clamp(GS.data.energy+n,0,100); UI.updateEnergy(); },
  factor(){ return GS.data.energy<=0?0.5:1; }   // tired = a bit slower, never punished
};

/* ---- Farming ---- */
const Farming={
  // tap a plot: till → plant → water → harvest, depending on state
  interact(i){
    const p=GS.data.plots[i];
    // till (skippable in casual mode)
    if(!p.tilled && !p.crop){
      if(GS.data.casualMode){ p.tilled=true; this.openSeedPicker(i); }
      else { p.tilled=true; Energy.spend(2); UI.popAt('🪓 Digembur', World.plotMeshes[i].position); Audio.sfx('plant'); World.refreshPlot(i); Tween.pop(World.plotMeshes[i]); SaveManager.request(); }
      return;
    }
    if(p.tilled && !p.crop){ this.openSeedPicker(i); return; }
    // grown? harvest
    if(p.crop){
      const grown=p.grown||(GS.time-p.planted)>=CROPS[p.crop].grow;
      if(grown){ this.harvest(i); }
      else if(!p.watered){ this.water(i); }
      else { UI.popAt('🌱 Tumbuh…', World.plotMeshes[i].position); }
    }
  },
  openSeedPicker(i){
    const opts=Object.keys(CROPS).map(k=>{
      const c=CROPS[k], inSeason=(c.season===GS.data.season);
      return {id:k, icon:c.emoji, title:c.name,
        meta:(inSeason?'🌿 Musim ini':'⛔ '+c.season)+' · 🪙'+SEEDS[k].cost,
        disabled:!inSeason || GS.data.coins<SEEDS[k].cost,
        onPick:()=>this.plant(i,k)};
    });
    UI.choice('Pilih Benih', opts);
  },
  plant(i,key){
    if(GS.data.coins<SEEDS[key].cost){ UI.toast('Koin kurang 🪙'); return; }
    const p=GS.data.plots[i];
    Economy.spend(SEEDS[key].cost);
    p.crop=key; p.planted=GS.time; p.grown=false; p.watered=GS.data.weather==='hujan';
    Energy.spend(1);
    World.refreshPlot(i); Tween.pop(World.plotMeshes[i]);
    UI.popAt(CROPS[key].emoji+' Ditanam', World.plotMeshes[i].position);
    Audio.sfx('plant'); UI.haptic(12); UI.tutorialStep('water');
    SaveManager.request();
  },
  water(i){
    const p=GS.data.plots[i];
    if(!p.crop||p.watered) return;
    const lvl=GS.data.tools.watering;
    if(lvl>=2){ // Lv2 waters whole 3x3
      GS.data.plots.forEach((pl,j)=>{ if(pl.crop&&!pl.watered){pl.watered=true;World.refreshPlot(j);} });
      UI.popAt('💧 Siram 3×3', World.plotMeshes[i].position);
    } else {
      p.watered=true; World.refreshPlot(i);
      UI.popAt('💧 Disiram', World.plotMeshes[i].position);
    }
    Energy.spend(lvl>=3?1:2); Audio.sfx('water'); UI.haptic(10); Tween.pop(World.plotMeshes[i]);
    UI.tutorialStep('harvest'); SaveManager.request();
  },
  harvest(i){
    const p=GS.data.plots[i], key=p.crop;
    Inv.add(key,1);
    Collection.markCrop(key);
    Quests.progress('harvest'); Stats.inc('harvest');
    UI.popAt('+1 '+CROPS[key].name+' '+CROPS[key].emoji, World.plotMeshes[i].position,'#fff');
    Audio.sfx('harvest'); UI.haptic(14);
    Particles_burst(World.plotMeshes[i].position, CROPS[key].fruit, 6);
    Tween.pop(World.plotMeshes[i],1.2);
    p.crop=null; p.grown=false; p.watered=false; p.tilled=GS.data.casualMode?false:true;
    World.refreshPlot(i);
    UI.tutorialStep('sell');
    SaveManager.request();
  },
  // growth tick — mark grown & gentle season effect
  tick(){
    GS.data.plots.forEach((p,i)=>{
      if(p.crop && !p.grown){
        let rate=1; if(CROPS[p.crop].season===GS.data.season) rate=1.15; // in-season slightly faster
        const eff=(GS.time-p.planted)*rate;
        if(eff>=CROPS[p.crop].grow){ p.grown=true; World.refreshPlot(i); }
      }
    });
  }
};
