const AnimalSys={
  get(id){ return GS.data.ranch.animals.find(a=>a.id===id); },
  label(a){ return a.name||ANIMAL_DEF[a.type].label; },
  interact(id){
    const a=this.get(id); if(!a) return;
    const def=ANIMAL_DEF[a.type], opts=[];
    if(a.ready) opts.push({id:'collect',icon:def.actIcon,title:def.action,meta:PRODUCTS[def.product].emoji,onPick:()=>this.collect(id)});
    opts.push({id:'feed',icon:'🌾',title:'Beri makan',meta:Inv.has('jagung')?'pakai jagung':'pakai rumput',onPick:()=>this.feed(id)});
    opts.push({id:'pet',icon:'🤚',title:'Elus / sapa',meta:'+mood',onPick:()=>this.pet(id)});
    opts.push({id:'name',icon:'🏷️',title:a.name?'Ganti nama':'Beri nama',meta:a.name||'-',onPick:()=>this.rename(id)});
    UI.choice(this.label(a)+' · ❤'+Math.round(a.mood)+'%', opts);
  },
  rename(id){ const a=this.get(id); if(!a) return;
    UI.promptText('🏷️ Nama '+ANIMAL_DEF[a.type].label, a.name||'', v=>{ a.name=v.trim().slice(0,12)||null;
      UI.toast(a.name?('Namanya sekarang '+a.name+' 💛'):'Nama dihapus'); SaveManager.request(); }); },
  feed(id){ const a=this.get(id),m=World.animalObjs[id]; if(!a) return;
    if(Inv.has('jagung')){ Inv.remove('jagung',1); a.mood=Util.clamp(a.mood+30,0,100); } else a.mood=Util.clamp(a.mood+15,0,100);
    Energy.spend(1); if(m){ UI.popAt('😋 +mood',m.position); Tween.pop(m); Hearts(m.position); }
    Audio.sfx('animal'); UI.haptic(12); SaveManager.request(); },
  pet(id){ const a=this.get(id),m=World.animalObjs[id]; if(!a) return;
    a.mood=Util.clamp(a.mood+8,0,100);
    if(m){ UI.popAt('💗',m.position,'#ff5d7a'); Tween.pop(m); Hearts(m.position,4); }
    Audio.sfx('heart'); UI.haptic(10); Collection.markAnimal(a.type); Quests.progress('pet'); Stats.inc('pet'); SaveManager.request(); },
  collect(id){ const a=this.get(id),m=World.animalObjs[id]; if(!a||!a.ready) return;
    const prod=ANIMAL_DEF[a.type].product; Inv.add(prod,1);
    if(prod==='telur'){ GS.data.stats.eggCollected=true; this.checkRecipeUnlock(); }
    a.ready=false; a.last=GS.time; a.mood=Util.clamp(a.mood-6,0,100); this.setReady(a,false);
    if(m){ UI.popAt('+1 '+PRODUCTS[prod].name+' '+PRODUCTS[prod].emoji,m.position,'#fff'); Particles_burst(new THREE.Vector3(m.position.x,1.2,m.position.z),0xffffff,5); Tween.pop(m); }
    Audio.sfx('harvest'); UI.haptic(14); Collection.markAnimal(a.type); SaveManager.request(); },
  feedAll(){ let n=0; GS.data.ranch.animals.forEach(a=>{ if(Inv.has('jagung')){ Inv.remove('jagung',1); a.mood=Util.clamp(a.mood+30,0,100); } else a.mood=Util.clamp(a.mood+12,0,100); n++;
      const m=World.animalObjs[a.id]; if(m){ Tween.pop(m); Hearts(m.position,2); } });
    Energy.spend(Math.min(6,n)); UI.toast('🌾 Memberi makan '+n+' hewan!'); Audio.sfx('animal'); UI.haptic(12); SaveManager.request(); },
  checkRecipeUnlock(){ if(GS.data.stats.eggCollected && !GS.data.recipesUnlocked.omelet){ GS.data.recipesUnlocked.omelet=true; UI.toast('Resep baru terbuka: Omelet 🍳'); } },
  // floating "ready" product icon above the animal
  setReady(a,ready){ const m=World.animalObjs[a.id]; if(!m) return;
    if(ready && !m.userData.readyMesh){ const icon=this.productMesh(ANIMAL_DEF[a.type].product); icon.position.set(0,2,0); m.add(icon); m.userData.readyMesh=icon; }
    else if(!ready && m.userData.readyMesh){ m.remove(m.userData.readyMesh); m.userData.readyMesh=null; } },
  productMesh(prod){ if(prod==='telur') return new THREE.Mesh(new THREE.SphereGeometry(0.16,8,8),mat(0xfff8e7));
    if(prod==='susu') return new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.28,8),mat(0xffffff));
    return new THREE.Mesh(new THREE.SphereGeometry(0.2,8,6),mat(0xf0f0f0)); },
  refreshIndicators(){ GS.data.ranch.animals.forEach(a=>{ if(a.ready) this.setReady(a,true); }); },
  // mood decay + becoming "ready" to produce when happy + auto-feeder
  _feedT:0,
  PADDOCK:{minX:-16.3,maxX:-7.3,minZ:-3.1,maxZ:1.9},
  tick(dt){ GS.data.ranch.animals.forEach(a=>{ a.mood=Util.clamp(a.mood-0.5*dt,0,100);
    if(!a.ready && a.mood>70 && (GS.time-(a.last||0))>ANIMAL_DEF[a.type].interval){
      a.ready=true; a.last=GS.time; this.setReady(a,true);
      const m=World.animalObjs[a.id]; if(m){ UI.popAt(PRODUCTS[ANIMAL_DEF[a.type].product].emoji,m.position); Audio.sfx('pop'); }
    } });
    // auto-feeder: while filled, gently tops up everyone's mood
    const f=GS.data.ranch.feeder;
    if(f && f.fill>0){ this._feedT+=dt; if(this._feedT>5){ this._feedT=0;
      GS.data.ranch.animals.forEach(a=>a.mood=Util.clamp(a.mood+4,0,100));
      f.fill=Math.max(0, f.fill - Math.max(1, GS.data.ranch.animals.length*0.5));
      if(f.fill<=0) World.setTroughHay(false);
    } }
  },
  // gentle grazing wander inside the paddock; hitbox + facing kept in sync
  updateWander(dt){
    GS.data.ranch.animals.forEach(a=>{ const m=World.animalObjs[a.id]; if(!m) return; const u=m.userData;
      if(!u.wt){ u.wt=new THREE.Vector3(m.position.x,0,m.position.z); u.wwait=Util.rand(1,4); u.face=m.rotation.y||0; }
      const dx=u.wt.x-m.position.x, dz=u.wt.z-m.position.z, d=Math.hypot(dx,dz);
      if(d<0.25){ u.wwait-=dt; if(u.wwait<=0){ u.wwait=Util.rand(2,6);
        u.wt.set(Util.rand(this.PADDOCK.minX,this.PADDOCK.maxX),0,Util.rand(this.PADDOCK.minZ,this.PADDOCK.maxZ)); } }
      else { const sp=(a.type==='ayam'?0.7:0.5); m.position.x+=dx/d*sp*dt; m.position.z+=dz/d*sp*dt;
        const tf=Math.atan2(-dz,dx); let df=tf-u.face; while(df>Math.PI)df-=6.283; while(df<-Math.PI)df+=6.283;
        u.face+=df*Math.min(1,6*dt); m.rotation.y=u.face; }
      if(u.entry) u.entry.hit.position.set(m.position.x,0.6,m.position.z);
    });
  }
};

/* ---- Ranch management: buy livestock + upgrade barn/coop capacity ---- */
const Ranch={
  caps:{barn:[0,3,5,8], coop:[0,3,5,8]},     // capacity per level (max Lv3)
  upCost:{barn:[0,0,300,700], coop:[0,0,250,600]},
  lvl(house){ return house==='barn'?GS.data.ranch.barnLevel:GS.data.ranch.coopLevel; },
  cap(house){ return this.caps[house][Math.min(this.lvl(house),3)]; },
  count(house){ const types=house==='barn'?['sapi','domba']:['ayam']; return GS.data.ranch.animals.filter(a=>types.includes(a.type)).length; },
  title(house){ return house==='barn'?'🐄 Kandang (Sapi & Domba)':'🐔 Kandang Ayam'; },
  openBarn(){ this.open('barn'); },
  openCoop(){ this.open('coop'); },
  open(house){
    const cap=this.cap(house),cnt=this.count(house),lvl=this.lvl(house);
    const types=house==='barn'?['sapi','domba']:['ayam'], opts=[];
    opts.push({id:'feedall',icon:'🌾',title:'Beri makan semua',meta:GS.data.ranch.animals.length+' hewan',onPick:()=>AnimalSys.feedAll()});
    types.forEach(t=>{ const d=ANIMAL_DEF[t];
      opts.push({id:'buy'+t,icon:({sapi:'🐄',domba:'🐑',ayam:'🐔'})[t],title:'Beli '+d.label,
        meta:'🪙'+d.cost+' · '+cnt+'/'+cap, disabled:GS.data.coins<d.cost||cnt>=cap, onPick:()=>this.buy(t,house)}); });
    if(lvl<3){ const c=this.upCost[house][lvl+1];
      opts.push({id:'up',icon:'⬆️',title:'Upgrade kandang (Lv'+lvl+'→'+(lvl+1)+')',meta:'🪙'+c+' · kapasitas '+cap+'→'+this.caps[house][lvl+1],disabled:GS.data.coins<c,onPick:()=>this.upgrade(house)}); }
    else opts.push({id:'max',icon:'⭐',title:'Kandang level maksimal',meta:'kapasitas '+cap,disabled:true,onPick:()=>{}});
    UI.choice(this.title(house)+' · Lv'+lvl, opts);
  },
  buy(type,house){ const d=ANIMAL_DEF[type];
    if(GS.data.coins<d.cost||this.count(house)>=this.cap(house)) return;
    Economy.spend(d.cost);
    const a={id:GS.data.ranch.nextId++,type,name:null,mood:60,last:GS.time,ready:false};
    GS.data.ranch.animals.push(a); World.spawnAnimal(a); World.layoutAnimals();
    UI.toast('🎉 '+d.label+' baru bergabung di kandang!'); Audio.sfx('animal'); UI.haptic(15);
    SaveManager.request(); setTimeout(()=>this.open(house),160);
  },
  upgrade(house){ const lvl=this.lvl(house); if(lvl>=3) return; const c=this.upCost[house][lvl+1];
    if(GS.data.coins<c) return; Economy.spend(c);
    if(house==='barn') GS.data.ranch.barnLevel++; else GS.data.ranch.coopLevel++;
    const mesh=house==='barn'?World.barnMesh:World.coopMesh; if(mesh) mesh.scale.multiplyScalar(1.12);
    UI.toast('⬆️ Kandang di-upgrade! Kapasitas '+this.cap(house)); UI.haptic(15); UI.confetti();
    SaveManager.request(); setTimeout(()=>this.open(house),160);
  },
  // auto-feeder trough
  openFeeder(){
    const f=GS.data.ranch.feeder;
    UI.choice('🪣 Palung Pakan · '+Math.round(f.fill)+'/'+f.max,[
      {id:'fill',icon:'🌾',title:'Isi palung penuh',meta:'🪙40',disabled:GS.data.coins<40||f.fill>=f.max,onPick:()=>this.fillFeeder()},
      {id:'info',icon:'ℹ️',title:'Palung memberi makan semua hewan otomatis',meta:'',disabled:true,onPick:()=>{}},
    ]);
  },
  fillFeeder(){ const f=GS.data.ranch.feeder; if(GS.data.coins<40||f.fill>=f.max) return;
    Economy.spend(40); f.fill=f.max; World.setTroughHay(true);
    UI.toast('🌾 Palung terisi penuh! Hewan akan kenyang otomatis.'); Audio.sfx('plant'); UI.haptic(12);
    SaveManager.request(); setTimeout(()=>this.openFeeder(),150);
  }
};
function Hearts(pos,n=3){ for(let i=0;i<n;i++){ setTimeout(()=>Particles_burst(new THREE.Vector3(pos.x,pos.y+1.4,pos.z),0xff5d7a,1,{spread:0.4,size:0.12}),i*80); } }

/* ---- Cooking ---- */
const Cooking={
  busy:false,
  open(){
    if(this.busy){ UI.toast('Sedang memasak… 🍳'); return; }
    const opts=Object.keys(RECIPES).map(k=>{
      const r=RECIPES[k], unlocked=GS.data.recipesUnlocked[k];
      const can=unlocked && Object.entries(r.need).every(([id,n])=>Inv.has(id,n));
      const needStr=Object.entries(r.need).map(([id,n])=>Inv.emojiOf(id)+'×'+n).join(' ');
      return {id:k, icon:unlocked?r.emoji:'❓', title:unlocked?r.name:'???',
        meta:unlocked?needStr:'terkunci', disabled:!can, onPick:()=>this.cook(k)};
    });
    UI.choice('Buku Resep 🍳', opts);
  },
  cook(key){
    const r=RECIPES[key];
    if(!Object.entries(r.need).every(([id,n])=>Inv.has(id,n))){ UI.toast('Bahan kurang'); return; }
    Object.entries(r.need).forEach(([id,n])=>Inv.remove(id,n));
    this.busy=true; Energy.spend(3);
    UI.toast('Memasak '+r.name+'… 🍳'); Audio.sfx('cook');
    setTimeout(()=>{
      this.busy=false; Inv.add(key,1);
      GS.data.stats.dishesCooked++;
      Collection.markRecipe(key);
      Quests.progress('cook'); Stats.inc('cook');
      this.checkSteakUnlock();
      UI.popAt('+1 '+r.name+' '+r.emoji, World.player.position,'#fff');
      Audio.sfx('done'); UI.haptic(15);
      Particles_burst(new THREE.Vector3(8,1.4,-5),0xffd84d,7);
      SaveManager.request();
    },5000);
  },
  checkSteakUnlock(){
    if(GS.data.stats.dishesCooked>=3 && !GS.data.recipesUnlocked.steak){
      GS.data.recipesUnlocked.steak=true; UI.toast('Resep baru terbuka: Steak 🥩');
      // also unlock daging availability via shop/animal milestone (simplified)
    }
  }
};

/* ---- Fishing: cast -> wait for bite -> "reel" tap-in-zone mini-game ----
   The mini-game runs as a DOM overlay (its own rAF) so it never conflicts
   with the world's one-finger touch input. Cozy: failing just lets the fish
   escape with no penalty. Rod upgrades make the green zone wider & marker
   slower, and tilt the catch table toward rarer fish / less junk. */
const Fishing={
  busy:false, raf:null, state:null, _biteTimer:null,
  start(spotName){
    if(this.busy) return;
    this.busy=true; Energy.spend(2);
    UI.toast('🎣 Melempar kail di '+(spotName||'air')+'… tunggu sambaran!');
    Audio.sfx('water');
    const wait=Util.rand(1.6,4.2);                 // random time until a bite
    this._biteTimer=setTimeout(()=>this.bite(spotName), wait*1000);
  },
  bite(spotName){
    if(!this.busy) return;
    Audio.sfx('pop'); UI.haptic(15);
    const rod=GS.data.tools.rod||1;
    const zoneW=[0,0.20,0.28,0.38][rod]||0.20;     // wider catch zone at higher rod
    const speed=[0,0.85,0.72,0.58][rod]||0.85;     // slower marker at higher rod
    this.state={ prog:25, marker:0.5, dir:1, speed, zoneW,
      zone:Util.rand(0.08,0.92-zoneW), time:13, last:performance.now(), spot:spotName };
    this.openUI(); this.loop();
  },
  openUI(){
    const body=Util.$('#fishing-body');
    body.innerHTML=
      '<h2>🎣 Strike! Tarik ikannya!</h2>'+
      '<div class="fish-meta">Tap <b>TARIK</b> saat penanda merah ada di zona hijau.</div>'+
      '<div class="fish-track"><div class="fish-zone" id="fish-zone"></div><div class="fish-marker" id="fish-marker"></div></div>'+
      '<div class="fish-bar"><div class="fish-fill" id="fish-fill"></div></div>'+
      '<div class="fish-timer"><div id="fish-time"></div></div>'+
      '<button class="btn" id="fish-tap">TARIK 🎣</button>';
    Util.$('#modal-fishing').classList.add('on');
    // onclick (not addEventListener) so handlers never accumulate across casts
    Util.$('#fish-tap').onclick=()=>this.pull();
    body.onclick=(e)=>{ if(this.state && (!e.target||e.target.id!=='fish-tap')) this.pull(); };
    this.render();
  },
  pull(){
    const s=this.state; if(!s) return;
    const inZone = s.marker>=s.zone && s.marker<=s.zone+s.zoneW;
    if(inZone){
      const center=s.zone+s.zoneW/2, acc=1-Math.abs(s.marker-center)/(s.zoneW/2);
      s.prog+= 14 + acc*10;                         // center hits give a bonus
      Audio.sfx('pop'); UI.haptic(8);
      const tr=Util.$('.fish-track'); if(tr){ tr.classList.remove('fish-flash'); void tr.offsetWidth; tr.classList.add('fish-flash'); }
      s.zone=Util.rand(0.06,0.94-s.zoneW);          // relocate zone for next pull
    } else { s.prog-=10; Audio.sfx('step'); }
    s.prog=Util.clamp(s.prog,0,100);
    if(s.prog>=100) this.win();
  },
  loop(){
    const s=this.state; if(!s) return;
    const now=performance.now(), dt=Math.min((now-s.last)/1000,0.05); s.last=now;
    s.marker+=s.dir*s.speed*dt;
    if(s.marker>1){ s.marker=1; s.dir=-1; } if(s.marker<0){ s.marker=0; s.dir=1; }
    s.time-=dt; this.render();
    if(s.time<=0){ this.escape(); return; }
    this.raf=requestAnimationFrame(()=>this.loop());
  },
  render(){
    const s=this.state; if(!s) return;
    const zone=Util.$('#fish-zone'); if(!zone) return;
    zone.style.left=(s.zone*100)+'%'; zone.style.width=(s.zoneW*100)+'%';
    Util.$('#fish-marker').style.left='calc('+(s.marker*100)+'% - 4px)';
    Util.$('#fish-fill').style.width=s.prog+'%';
    Util.$('#fish-time').style.width=Util.clamp(s.time/13*100,0,100)+'%';
  },
  win(){
    this._finish();
    // variable reward: small chance of a treasure chest instead of a fish
    if(Math.random()<0.10){
      const c=Util.randInt(40,110); Economy.earn(c);
      UI.popAt('🎁 +'+c+' 🪙', World.player.position,'#ffe08a');
      UI.toast('🎁 Peti harta! Dapat 🪙'+c);
      Audio.sfx('milestone'); UI.haptic(15); UI.confetti();
      Particles_burst(new THREE.Vector3(World.player.position.x,1.4,World.player.position.z),0xffd84d,8);
      SaveManager.request(); return;
    }
    const fish=this.pickFish();
    const golden = !FISH[fish].junk && Math.random()<0.06;   // shiny variant
    const gain = golden?2:1;                                  // golden = double
    Inv.add(fish,gain);
    if(!FISH[fish].junk){ GS.data.stats.fishCaught++; Collection.markFish(fish); Quests.progress('fish'); Stats.inc('fish'); }
    const label=(golden?'✨ EMAS ✨ ':'')+FISH[fish].name+' '+FISH[fish].emoji+(golden?' x2':'');
    UI.popAt('+'+gain+' '+FISH[fish].emoji, World.player.position,'#aee2ff');
    UI.toast((FISH[fish].rarity>=4||golden?'🎉 ':'')+'Dapat '+label);
    Audio.sfx(FISH[fish].rarity>=4||golden?'milestone':'done'); UI.haptic(15);
    Particles_burst(new THREE.Vector3(World.player.position.x,1.4,World.player.position.z),golden?0xffd84d:0xaee2ff,golden?9:7);
    if(FISH[fish].rarity>=4||golden) UI.confetti();
    SaveManager.request();
  },
  escape(){ this._finish(); UI.toast('🐟💨 Ikannya lolos… santai, coba lagi ya!'); Audio.sfx('step'); },
  _finish(){
    if(this.raf) cancelAnimationFrame(this.raf); this.raf=null;
    clearTimeout(this._biteTimer);
    this.state=null; this.busy=false;
    Util.$('#fishing-body').onclick=null;
    Util.$('#modal-fishing').classList.remove('on');
  },
  // weighted random; higher rod -> less junk, more rare
  pickFish(){
    const rod=GS.data.tools.rod||1;
    const entries=Object.entries(FISH).map(([k,f])=>{
      let w=f.weight;
      if(f.junk) w*=(rod>=2?0.5:1)*(rod>=3?0.5:1);
      if(f.rarity>=4) w*=(1+(rod-1)*0.8);
      return [k,w];
    });
    const total=entries.reduce((a,[,w])=>a+w,0); let r=Math.random()*total;
    for(const [k,w] of entries){ r-=w; if(r<=0) return k; }
    return 'ikan_kecil';
  }
};

/* ---- Economy: shop, shipping bin, customers ---- */
const Economy={
  spend(n){ GS.data.coins=Math.max(0,GS.data.coins-n); UI.updateCoins(); },
  earn(n){ GS.data.coins+=n; UI.updateCoins(); Audio.sfx('coin'); Stats.inc('coins',n); },
  // souvenir shop: sell raw goods instantly (lower price) + open upgrades
  _price(id){ let p=CROPS[id]?.sell||PRODUCTS[id]?.sell||FISH[id]?.sell||BUGS[id]?.sell||FOSSILS[id]?.sell||5;
    if(GS.data.shopDeal && GS.data.shopDeal.id===id) p=Math.round(p*1.5); return p; },
  ensureDeal(){ if(GS.data.shopDeal.day!==GS.data.day){ GS.data.shopDeal.day=GS.data.day;
    const pool=[...Object.keys(CROPS),...Object.keys(PRODUCTS),...Object.keys(FISH).filter(k=>!FISH[k].junk)];
    GS.data.shopDeal.id=Util.pick(pool); } },
  openShop(){
    this.ensureDeal();
    const sellable=Object.keys(GS.data.inventory).filter(id=>CROPS[id]||PRODUCTS[id]||FISH[id]||BUGS[id]||FOSSILS[id]);
    const opts=[];
    opts.push({id:'deal',icon:'⭐',title:'Penawaran hari ini: '+Inv.nameOf(GS.data.shopDeal.id)+' '+Inv.emojiOf(GS.data.shopDeal.id)+' +50% jual!',meta:'',disabled:true,onPick:()=>{}});
    sellable.forEach(id=>{
      const instant=Math.round(this._price(id)*0.8);
      opts.push({id, icon:Inv.emojiOf(id), title:'Jual '+Inv.nameOf(id),
        meta:'x'+Inv.count(id)+' · 🪙'+instant+' /pcs'+(GS.data.shopDeal.id===id?' ⭐':''), onPick:()=>this.sell(id,instant)});
    });
    opts.push({id:'furn', icon:'🪑', title:'Toko Furnitur (dekorasi)', meta:'→', onPick:()=>Decor.openShopMenu()});
    opts.push({id:'upg', icon:'🔧', title:'Upgrade Alat', meta:'lihat →', onPick:()=>this.openUpgrades()});
    UI.choice('Toko Suvenir 🛒', opts);
  },
  // dedicated upgrade menu — pure coin sinks for convenience, never gate content
  openUpgrades(){
    const c=GS.data.coins, opts=[];
    if(GS.data.tools.watering<2) opts.push({id:'w2',icon:'🪣',title:'Gembor Lv2 (siram 3×3)',meta:'🪙120',disabled:c<120,onPick:()=>this._buy(120,()=>{GS.data.tools.watering=2;UI.toast('Gembor Lv2! Siram 3×3 💧');})});
    else if(GS.data.tools.watering<3) opts.push({id:'w3',icon:'🪣',title:'Gembor Lv3 (lebih hemat tenaga)',meta:'🪙260',disabled:c<260,onPick:()=>this._buy(260,()=>{GS.data.tools.watering=3;UI.toast('Gembor Lv3! 💧✨');})});
    const rod=GS.data.tools.rod||1;
    if(rod<3){ const cost=[0,140,300][rod]; opts.push({id:'rod',icon:'🎣',title:'Joran Lv'+(rod+1)+' (zona hijau lebih besar, ikan langka↑)',meta:'🪙'+cost,disabled:c<cost,onPick:()=>this._buy(cost,()=>{GS.data.tools.rod=rod+1;UI.toast('Joran Lv'+(rod+1)+'! Memancing makin gampang 🎣');})}); }

    UI.toast('Lahan diperluas! 🌾 (petak baru — TODO v2: render 3×3 kedua)');
    // TODO: v2 — actually instantiate a second 3x3 plot block in World
    SaveManager.request();
  },
  // shipping bin: deposit raw goods, sold next morning at base price
  openShipping(){
    const sellable=Object.keys(GS.data.inventory).filter(id=>CROPS[id]||PRODUCTS[id]||FISH[id]||BUGS[id]||FOSSILS[id]);
    if(!sellable.length){
      const total=Object.entries(GS.data.shippingBin).reduce((s,[id,n])=>s+this._price(id)*n,0);
      UI.toast(total>0?('Kotak berisi barang senilai ~🪙'+total+' (terjual besok pagi)'):'Kotak kosong 📦');
      return;
    }
    const opts=sellable.map(id=>({id, icon:Inv.emojiOf(id), title:'Kirim '+Inv.nameOf(id),
      meta:'x'+Inv.count(id)+' · 🪙'+this._price(id)+' /pcs (besok)',
      onPick:()=>this.ship(id)}));
    UI.choice('Kotak Pengiriman 📦', opts);
  },
  ship(id){
    if(!Inv.has(id)) return;
    Inv.remove(id,1);
    GS.data.shippingBin[id]=(GS.data.shippingBin[id]||0)+1;
    UI.popAt('📦 dikirim', World.shipMesh.position);
    Audio.sfx('pop'); SaveManager.request();
    setTimeout(()=>this.openShipping(),120);
  },
  resolveShipping(){
    let total=0;
    for(const [id,n] of Object.entries(GS.data.shippingBin)){
      total+=this._price(id)*n;
    }
    if(total>0){ this.earn(total); GS.data.shippingBin={};
      setTimeout(()=>UI.toast('💰 Kotak pengiriman terjual: +🪙'+total),900); }
  }
};

const NPC_DATA={

/* ---- Customers (use NPC look; spawn at tables) ---- */
const Customers={

    c.userData.entry=entry;

    World.customers.push(c);
  },
  serve(c){
    const want=c.userData.want;
    if(!Inv.has(want)){ UI.bubble(c,'Belum punya '+RECIPES[want].name+' 😅'); return; }
    Inv.remove(want,1);
    const r=RECIPES[want];

    const happy=Math.random()<0.7;

    Economy.earn(pay);
    Quests.progress('sold'); Stats.inc('sold');
    UI.bubble(c, happy?('Enak sekali! 😍 +🪙'+pay):('Terima kasih 🙂 +🪙'+pay));

    setTimeout(()=>{

      if(i>=0){ SceneSetup.scene.remove(World.interactables[i].hit); World.interactables.splice(i,1); }
      SceneSetup.scene.remove(c);
      const j=World.customers.indexOf(c); if(j>=0) World.customers.splice(j,1);

  }
};

/* ---- Daily Quests: 3 small tasks per day, reward coins + friendship ---- */
const Quests={
  ensure(){
    if(GS.data.quests.day!==GS.data.day){
      GS.data.quests.day=GS.data.day;
      GS.data.quests.claimed=false;
      GS.data.quests.list=this.generate();
      SaveManager.request();
    }
  },
  generate(){
    const pool=[
      {type:'harvest',min:2,max:4,label:'Panen {n} hasil kebun',icon:'🌾'},
      {type:'fish',   min:1,max:2,label:'Tangkap {n} ikan',     icon:'🎣'},
      {type:'cook',   min:1,max:1,label:'Masak {n} hidangan',   icon:'🍳'},
      {type:'pet',    min:2,max:3,label:'Sapa/elus {n} hewan',  icon:'🐮'},
      {type:'sold',   min:2,max:4,label:'Jual {n} barang',      icon:'🛒'},
    ].sort(()=>Math.random()-0.5).slice(0,3);
    return pool.map(p=>{ const target=Util.randInt(p.min,p.max);
      return {type:p.type,target,have:0,icon:p.icon,label:p.label.replace('{n}',target)}; });
  },
  progress(type,n=1){
    this.ensure();
    let changed=false;
    GS.data.quests.list.forEach(q=>{ if(q.type===type && q.have<q.target){ q.have=Math.min(q.target,q.have+n); changed=true; } });
    if(changed){
      SaveManager.request();
      if(this.allDone() && !GS.data.quests.claimed) UI.toast('📋 Misi harian selesai! Ambil hadiah di menu ☰');
    }
  },
  allDone(){ return GS.data.quests.list.length>0 && GS.data.quests.list.every(q=>q.have>=q.target); },
  claim(){
    if(!this.allDone() || GS.data.quests.claimed) return;
    GS.data.quests.claimed=true;
    Economy.earn(60);
    Object.keys(GS.data.friendship).forEach(k=>NPCSys.addFriend(k,0.3));
    UI.toast('🎁 Hadiah misi harian: +🪙60 + ❤ semua warga!'); UI.confetti(); UI.haptic(15);
    SaveManager.request();
  }
};

/* ---- Bugs: catchable critters that wander; tap to catch (small escape %) ---- */
const Bugs={
  list:[], max:5,
  colors:{kupu:0xff8fab,capung:0x6fd0ff,kumbang:0x6a8f3f,lebah:0xffd35e,kepik:0xff5d5d},
  init(){ this.list=[]; for(let i=0;i<this.max;i++) this.spawn(); },
  spawn(){
    const key=Util.pick(Object.keys(BUGS));
    const b=Builders.bug(this.colors[key]||0xffffff);
    const cx=Util.rand(-26,26),cz=Util.rand(-26,26);
    b.position.set(cx,1,cz);
    b.userData={key,cx,cz,phase:Util.rand(0,6.28),r:Util.rand(2,5),sp:Util.rand(0.3,0.6)};
    SceneSetup.scene.add(b);
    b.userData.entry=World.register(b,'bug',{ref:b,key},2.0,1.4);
    this.list.push(b);
  },
  catch(b){
    const key=b.userData.key;
    if(Math.random()<0.18){ UI.popAt('💨 kabur!', b.position); Audio.sfx('step'); this.remove(b); setTimeout(()=>this.spawn(),Util.rand(3,7)*1000); return; }
    Inv.add(key,1); Collection.markBug(key);
    UI.popAt('+1 '+BUGS[key].name+' '+BUGS[key].emoji, b.position,'#caffca');
    Audio.sfx('harvest'); UI.haptic(12); Particles_burst(b.position,0xcaffca,5);
    this.remove(b); setTimeout(()=>this.spawn(),Util.rand(4,9)*1000); SaveManager.request();
  },
  remove(b){
    const i=World.interactables.findIndex(e=>e.root===b);
    if(i>=0){ SceneSetup.scene.remove(World.interactables[i].hit); World.interactables.splice(i,1); }
    SceneSetup.scene.remove(b); const j=this.list.indexOf(b); if(j>=0) this.list.splice(j,1);
  },
  update(t){
    this.list.forEach(b=>{ const u=b.userData;
      b.position.x=u.cx+Math.cos(t*u.sp+u.phase)*u.r; b.position.z=u.cz+Math.sin(t*u.sp+u.phase)*u.r;
      b.position.y=1+Math.sin(t*3+u.phase)*0.4; b.rotation.y=-(t*u.sp+u.phase)+Math.PI/2;
      if(u.wL){ u.wL.rotation.y=-(0.5+Math.sin(t*16)*0.6); u.wR.rotation.y=(0.5+Math.sin(t*16)*0.6); }
      if(u.entry) u.entry.hit.position.set(b.position.x,0.8,b.position.z);
    });
  }
};

/* ---- Decor: buy & place furniture; "edit mode" places/picks-up on ground tap ---- */
const Decor={
  group:null, editing:false, selected:null,
  init(){ this.group=new THREE.Group(); SceneSetup.scene.add(this.group); this.rebuild(); },
  rebuild(){
    if(!this.group) return;
    while(this.group.children.length) this.group.remove(this.group.children[0]);
    GS.data.placedDecor.forEach(d=>{ const m=Builders.decor(d.type); m.position.set(d.x,0,d.z); m.rotation.y=d.ry||0; m.userData.decorRef=d; this.group.add(m); });
  },
  openShopMenu(){
    const opts=Object.keys(DECOR).map(t=>({id:t,icon:DECOR[t].emoji,title:'Beli '+DECOR[t].name,
      meta:'🪙'+DECOR[t].cost+(GS.data.decorInv[t]?(' · punya '+GS.data.decorInv[t]):''),
      disabled:GS.data.coins<DECOR[t].cost,onPick:()=>this.buy(t)}));
    opts.push({id:'place',icon:'✋',title:'Mode Tata (letakkan / ambil)',meta:'→',onPick:()=>this.enterEdit()});
    UI.choice('🪑 Toko Furnitur', opts);
  },
  buy(t){ if(GS.data.coins<DECOR[t].cost) return; Economy.spend(DECOR[t].cost);
    GS.data.decorInv[t]=(GS.data.decorInv[t]||0)+1; UI.toast('Beli '+DECOR[t].name+' '+DECOR[t].emoji); UI.haptic(12);
    SaveManager.request(); setTimeout(()=>this.openShopMenu(),140); },
  enterEdit(){ this.editing=true; this.selected=Object.keys(GS.data.decorInv).find(k=>GS.data.decorInv[k]>0)||null;
    UI.showDecorBar(); UI.toast('Mode Tata: tap tanah untuk meletakkan, tap furnitur untuk ambil.'); },
  exitEdit(){ this.editing=false; UI.hideDecorBar(); SaveManager.request(); },
  select(t){ this.selected=t; UI.showDecorBar(); },
  placeAt(x,z){
    const t=this.selected;
    if(!t||!(GS.data.decorInv[t]>0)){ UI.toast('Pilih/beli furnitur dulu 🪑'); return; }
    GS.data.decorInv[t]--;
    const d={type:t,x:+x.toFixed(2),z:+z.toFixed(2),ry:Util.rand(0,6.28)};
    GS.data.placedDecor.push(d);
    const m=Builders.decor(t); m.position.set(d.x,0,d.z); m.rotation.y=d.ry; m.userData.decorRef=d; this.group.add(m);
    Audio.sfx('plant'); UI.haptic(10); Particles_burst(new THREE.Vector3(d.x,0.4,d.z),0x9fd86f,4);
    UI.showDecorBar(); SaveManager.request();
  },
  pickupNear(x,z){
    let best=null,bd=1.3;
    this.group.children.forEach(m=>{ const dd=Math.hypot(m.position.x-x,m.position.z-z); if(dd<bd){bd=dd;best=m;} });
    if(!best) return false;
    const d=best.userData.decorRef; GS.data.decorInv[d.type]=(GS.data.decorInv[d.type]||0)+1;
    const idx=GS.data.placedDecor.indexOf(d); if(idx>=0) GS.data.placedDecor.splice(idx,1);
    this.group.remove(best); Audio.sfx('pop'); UI.haptic(8); UI.popAt('📦 diambil', new THREE.Vector3(x,0.4,z));
    UI.showDecorBar(); SaveManager.request(); return true;
  }
};

/* Interaction dispatcher — routes a tapped entry to the right system     */

const Interactions={
  run(entry){
    UI.haptic(10);
    switch(entry.kind){
      case 'plot':     Farming.interact(entry.data.index); break;
      case 'animal':   AnimalSys.interact(entry.data.id); break;
      case 'barn':     Ranch.openBarn(); break;
      case 'coop':     Ranch.openCoop(); break;
      case 'feeder':   Ranch.openFeeder(); break;
      case 'kitchen':  Cooking.open(); break;
      case 'shop':     Economy.openShop(); break;
      case 'shipping': Economy.openShipping(); break;
      case 'customer': Customers.serve(entry.data.ref); break;
      case 'npc':      NPCSys.interact(entry.data.key); break;
      case 'bed':      Game.sleep(); break;
      case 'wardrobe': UI.openCreator(); break;
      case 'sign':     UI.openRename(); break;
      case 'water':    Fishing.start(entry.data.spot); break;
      case 'mailbox':  Mailbox.open(); break;
      case 'bug':      Bugs.catch(entry.data.ref); break;
      case 'dig':      Dig.dig(entry.data.ref); break;
    }
  },
  _removeEntry(entry){
    const i=World.interactables.indexOf(entry);
    if(i>=0){ SceneSetup.scene.remove(entry.hit); World.interactables.splice(i,1); }
  }
};

    const labels=World.labels; if(!labels||!World.player) return;
    const px=World.player.position.x, pz=World.player.position.z;
    for(const L of labels){
      const op=L.obj.position, dist=Math.hypot(op.x-px,op.z-pz);
      const a=Util.clamp((14-dist)/6,0,1);
      if(a<=0.02){ if(L.el.style.opacity!=='0') L.el.style.opacity='0'; continue; }
      const v=new THREE.Vector3(op.x,L.y,op.z).project(SceneSetup.camera);

      L.el.style.left=((v.x*0.5+0.5)*window.innerWidth)+'px';
      L.el.style.top=((-v.y*0.5+0.5)*window.innerHeight)+'px';

    ctx.clearRect(0,0,W,H);
    const R=34, sc=(W/2-4)/R, cx=W/2, cy=H/2;
    const tx=v=>cx+v*sc, tz=v=>cy+v*sc;
    ctx.fillStyle='#8fbc8f'; ctx.beginPath(); ctx.arc(cx,cy,W/2-3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#b98a55'; [[-6,8],[8,-5],[5,8],[-9,-6],[8,3]].forEach(([x,z])=>ctx.fillRect(tx(x)-2,tz(z)-2,4,4));
    ctx.fillStyle='#4aa3d6'; [[13,-1],[-15,13]].forEach(([x,z])=>{ctx.beginPath();ctx.arc(tx(x),tz(z),3,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#ffb020'; (Dig.spots||[]).forEach(m=>{ctx.fillRect(tx(m.position.x)-1.5,tz(m.position.z)-1.5,3,3);});
    ctx.fillStyle='#ff8fab'; Object.values(World.npcObjs||{}).forEach(n=>{ctx.beginPath();ctx.arc(tx(n.position.x),tz(n.position.z),2,0,Math.PI*2);ctx.fill();});
    if(World.player){ ctx.fillStyle='#fff'; ctx.strokeStyle='#4a3b2a'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(tx(World.player.position.x),tz(World.player.position.z),3.5,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
  },

  /* ---- photo mode (hide HUD for clean screenshots) ---- */
  photo:false,
  togglePhoto(){
    this.photo=!this.photo;
    Util.$('#ui-root').style.opacity=this.photo?'0':'1';
    Util.$('#ui-root').style.pointerEvents=this.photo?'none':'';
    Util.$('#photo-exit').style.display=this.photo?'block':'none';
    if(this.photo) this.toast('');
  },

  /* ---- Confetti burst (DOM) ---- */
  confetti(){
    const colors=['#ff8fab','#6aa84f','#ffd35e','#4d8af0','#ff7a5c'];
    for(let i=0;i<40;i++){
      const c=document.createElement('div'); c.className='confetti';
      c.style.background=Util.pick(colors);
      c.style.left=(50+Util.rand(-30,30))+'vw'; c.style.top='30vh';
      document.body.appendChild(c);
      const dx=Util.rand(-180,180), dy=Util.rand(200,460), rot=Util.rand(-360,360);
      c.animate([{transform:'translate(0,0) rotate(0)',opacity:1},
                 {transform:'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)',opacity:0}],
                 {duration:Util.rand(900,1500),easing:'cubic-bezier(.2,.6,.3,1)'}).onfinish=()=>c.remove();
    }
  }
};


/* ====================================================================== */
/* [12] Game — bootstrap + main loop (clock.getDelta everywhere)          */
/* ====================================================================== */
const Game={
  clock:new THREE.Clock(),
  growTimer:0, stepTimer:0, walkPhase:0, facing:0,
  fading:false,

  // WebGL capability check
  webglOK(){
    try{ const c=document.createElement('canvas');
      return !!(window.WebGLRenderingContext && (c.getContext('webgl')||c.getContext('experimental-webgl'))); }
    catch(e){ return false; }
  },

  boot(){
    if(!this.webglOK()){ Util.$('#splash').style.display='none'; Util.$('#fallback').style.display='flex'; return; }
    this.checkOrientation();
    window.addEventListener('resize',()=>this.checkOrientation());
    window.addEventListener('orientationchange',()=>setTimeout(()=>this.checkOrientation(),200));
    // prevent gestures: double-tap zoom, gesture events, context menu
    document.addEventListener('gesturestart',e=>e.preventDefault());
    document.addEventListener('contextmenu',e=>e.preventDefault());
    let lastTouch=0;
    document.addEventListener('touchend',e=>{ const n=Date.now(); if(n-lastTouch<300) e.preventDefault(); lastTouch=n; },{passive:false});

    // simulate asset/loading progress, then reveal Start
    let pct=0; const fill=Util.$('#bar-fill'), lbl=Util.$('#bar-pct');
    const tick=setInterval(()=>{
      pct=Math.min(100,pct+Util.rand(8,22));
      fill.style.width=pct+'%'; lbl.textContent='Memuat… '+Math.floor(pct)+'%';
      if(pct>=100){ clearInterval(tick); lbl.textContent='Siap! 🌿'; Util.$('#start-btn').style.display='inline-block'; }
    },180);
    Util.$('#start-btn').addEventListener('click',()=>this.start());
  },

  checkOrientation(){
    const landscape=window.innerWidth>window.innerHeight;
    Util.$('#portrait-lock').style.display=landscape?'flex':'none';
  },

  start(){
    Audio.init(); Audio.resume(); Audio.startMusic();
    Util.$('#splash').style.display='none';
    Util.$('#ui-root').style.display='block';

    // load save
    GS.data=SaveManager.load();
    Audio.setVol('music',GS.data.settings.music); Audio.setVol('sfx',GS.data.settings.sfx);
    Audio.toggleMusic(GS.data.settings.music>0);

    // init engine + world
    SceneSetup.init(Util.$('#game-canvas'));
    PFX=new Particles(SceneSetup.scene);
    DayCycle.init();
    World.build();
    Input.init(); UI.init();

    // restore plot visuals
    // normalize growth timers: planted was stored against a previous session's
    // GS.time (resets to 0 on reload). Restart growth this session to avoid
    // ungrown crops getting "stuck". (Grown crops keep their grown flag.)
    GS.data.plots.forEach(p=>{ if(p.crop && !p.grown) p.planted=GS.time; });
    GS.data.plots.forEach((p,i)=>World.refreshPlot(i));

    // initial HUD
    UI.updateCoins(); UI.updateEnergy(); UI.renderInventory(); UI.updateDayLabel();
    NPCSys.maybeEvent();
    Quests.ensure(); Mailbox.updateFlag();
    Economy.ensureDeal(); Decor.init(); Bugs.init(); Dig.daily();
    UI.tutorialStart();

    GS.ready=true;
    this.clock.start();
    this.loop();
  },

  /* ---- sleep → next day ---- */
  sleep(){
    if(this.fading) return;
    this.fading=true;
    // fade overlay
    const f=document.createElement('div');
    f.style.cssText='position:fixed;inset:0;background:#000;z-index:80;opacity:0;transition:opacity .8s';
    document.body.appendChild(f);
    requestAnimationFrame(()=>f.style.opacity='1');
    setTimeout(()=>{
      DayCycle.nextDay();
      Energy.restore(100);
      // crops continue; clear daily greet
      GS.data.plots.forEach((p,i)=>World.refreshPlot(i));
      UI.updateCoins(); UI.updateEnergy(); UI.updateDayLabel(); UI.renderInventory();
      NPCSys.maybeEvent();
      Quests.ensure(); Mailbox.updateFlag();   // fresh quests + new daily gift
      Economy.ensureDeal(); Dig.daily();        // new shop deal + fresh dig spots
      SaveManager.save();
      UI.toast('☀️ Hari '+GS.data.day+' · '+GS.data.season+' '+SEASON_EMOJI[GS.data.season]);
      f.style.opacity='0';
      setTimeout(()=>{ f.remove(); this.fading=false; },800);
    },900);
  },

  /* ---- player movement + animation ---- */
  movePlayer(dt){
    const moving=Input.dir.lengthSq()>0.001 && !Input.autoWalk;
    let dir=new THREE.Vector3();
    let speed=0;

    if(Input.autoWalk){
      // walk toward tapped object, act on arrival
      const tgt=Input.autoWalk.target;
      const to=new THREE.Vector3(tgt.x-World.player.position.x,0,tgt.z-World.player.position.z);
      const dist=to.length();
      if(dist<=Input.autoWalk.entry.range){
        Interactions.run(Input.autoWalk.entry); Input.autoWalk=null;
      }else{
        to.normalize(); dir.copy(to); speed=4.2*Energy.factor()*(GS.data.tools.shoes?1.35:1);
      }
    } else if(moving){
      dir.set(Input.dir.x,0,Input.dir.y);
      speed=4.6*Input.speed*Energy.factor()*(GS.data.tools.shoes?1.35:1);
    }

    if(speed>0){
      World.player.position.addScaledVector(dir,speed*dt);
      // clamp to play area
      World.player.position.x=Util.clamp(World.player.position.x,-30,30);
      World.player.position.z=Util.clamp(World.player.position.z,-30,30);
      // smooth face direction (slerp-ish via angle lerp)
      const target=Math.atan2(dir.x,dir.z);
      let d=target-this.facing; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2;
      this.facing+=d*Math.min(1,12*dt);
      World.player.rotation.y=this.facing;
      // walk bob + limb swing
      this.walkPhase+=dt*10*(speed/4.6);
      const sw=Math.sin(this.walkPhase);
      World.player.position.y=Math.abs(Math.sin(this.walkPhase))*0.06;
      const u=World.player.userData;
      if(u.legL){ u.legL.rotation.x=sw*0.6; u.legR.rotation.x=-sw*0.6; u.armL.rotation.x=-sw*0.5; u.armR.rotation.x=sw*0.5; }
      World.player.children[0].rotation.z=-dir.x*0.08; // slight lean
      // footstep sfx
      this.stepTimer+=dt;
      if(this.stepTimer>0.32){ this.stepTimer=0; Audio.sfx('step'); }
    } else {
      // ease back to idle
      World.player.position.y=Util.damp(World.player.position.y,0,8,dt);
      const u=World.player.userData;
      if(u.legL){ u.legL.rotation.x=Util.damp(u.legL.rotation.x,0,10,dt); u.legR.rotation.x=Util.damp(u.legR.rotation.x,0,10,dt);
        u.armL.rotation.x=Util.damp(u.armL.rotation.x,0,10,dt); u.armR.rotation.x=Util.damp(u.armR.rotation.x,0,10,dt); }
    }
  },

  /* ---- idle animation for animals & customers ---- */
  animateCreatures(t){
    Object.values(World.animalObjs).forEach((a,i)=>{ a.position.y=Math.sin(t*1.6+i)*0.04;
      if(a.userData.readyMesh){ a.userData.readyMesh.rotation.y=t*2; a.userData.readyMesh.position.y=2+Math.sin(t*3+i)*0.12; } });
    World.customers.forEach((c,i)=>{ c.position.y=Math.sin(t*2+i)*0.03; });
    // NPC gentle bob
    Object.values(World.npcObjs).forEach((n,i)=>{ const u=n.userData; n.children[1].position.y=1.42+Math.sin(t*2+i)*0.02; });
  },

  loop(){
    requestAnimationFrame(()=>this.loop());
    if(!GS.ready) return;
    const dt=Math.min(this.clock.getDelta(),0.05);  // clamp to avoid jumps
    GS.time+=dt;

    this.movePlayer(dt);
    World.playerPos.copy(World.player.position);
    SceneSetup.follow(World.player.position, new THREE.Vector3(Input.dir.x,0,Input.dir.y), dt);
    // focus the curved-world bend on the camera target so the player stays upright
    Curve.center.value.set(SceneSetup.camTarget.x,0,SceneSetup.camTarget.z);

    DayCycle.update(dt);
    Tween.update(dt);
    PFX.update(dt);
    this.animateCreatures(GS.time);
    World.animateDecor(GS.time);
    World.updateNPCs(dt);
    AnimalSys.updateWander(dt);
    Bugs.update(GS.time);
    this._miniT=(this._miniT||0)+dt; if(this._miniT>0.2){ this._miniT=0; UI.drawMinimap(); }

    // system ticks
    this.growTimer+=dt;
    if(this.growTimer>0.5){ this.growTimer=0; Farming.tick(); }
    AnimalSys.tick(dt);
    if(!Cooking.busy) Customers.tick(dt);

    // refresh crop growth visuals occasionally (cheap)
    // (handled inside Farming.tick on grown transition)

    UI.updateBubbles();
    UI.updateLabels();

    // gentle "go to sleep" nudge at night, once
    if(DayCycle.isNight() && !this._nightNudge){ this._nightNudge=true; UI.toast('Sudah malam, saatnya tidur 😴 (tap kasur)'); }
    if(!DayCycle.isNight()) this._nightNudge=false;

    SceneSetup.renderer.render(SceneSetup.scene, SceneSetup.camera);
  }
};

// kick off once DOM ready
if(document.readyState!=='loading') Game.boot();
else document.addEventListener('DOMContentLoaded',()=>Game.boot());
</script>
